server:
  port: 8080
  # Casdoor access token 较大（permissions claim 内嵌完整对象，实测 ~8.8KB）> Netty 默认 8KB 头上限 → 431。
  # 放大 edge 入站最大请求头（edge 会剥离 Authorization、下游只收较小的 X-Internal-Token，故仅 edge 入站需放大）。
  # 生产化：从 compose env 移入此处（可仍用 SERVER_MAX_HTTP_REQUEST_HEADER_SIZE 覆盖）。
  max-http-request-header-size: ${SERVER_MAX_HTTP_REQUEST_HEADER_SIZE:32KB}

spring:
  application:
    name: edge-gateway
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"
  cloud:
    gateway:
      # 前后端分离：允许独立部署的能力展示前端（及其它可信前端）跨域调用业务能力。
      # 生产务必用白名单具体来源，不要 *（X-Api-Key/Authorization 敏感）。
      # allow-credentials=true（刷新令牌 httpOnly cookie 跨域必需）时，allowedHeaders 不能为 *、
      # allowedOrigins 不能为 *，故显式列举。
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${GATEWAY_CORS_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost:8093}"
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            # If-Match：RBAC 管理写（PATCH/PUT）的乐观锁版本头，跨域预检必须放行。
            allowedHeaders: [Content-Type, Authorization, X-Api-Key, Accept, X-Trace-Id, If-Match]
            # X-Total-Count/ETag：管理端分页总数与资源版本，须暴露给浏览器读取。
            exposedHeaders: [X-Trace-Id, X-Total-Count, ETag]
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth
          uri: ${AUTH_URI:http://localhost:8092}
          predicates:
            - Path=/auth,/auth/**
        - id: analytics
          uri: ${ANALYTICS_URI:http://localhost:8083}
          predicates:
            - Path=/chat/sql,/analytics,/analytics/**
        - id: conversation
          uri: ${CONVERSATION_URI:http://localhost:8081}
          predicates:
            - Path=/chat,/chat/**,/extract,/extract/**,/memory,/memory/**
        - id: workflow
          uri: ${WORKFLOW_URI:http://localhost:8082}
          predicates:
            - Path=/workflow,/workflow/**
        - id: knowledge
          uri: ${KNOWLEDGE_URI:http://localhost:8084}
          predicates:
            - Path=/rag,/rag/**,/knowledge,/knowledge/**
        - id: agent
          uri: ${AGENT_URI:http://localhost:8085}
          predicates:
            - Path=/agent,/agent/**
        - id: async-task
          uri: ${ASYNC_TASK_URI:http://localhost:8086}
          predicates:
            - Path=/async,/async/**
        - id: channel
          uri: ${CHANNEL_URI:http://localhost:8087}
          predicates:
            - Path=/channel,/channel/**
        - id: interop
          uri: ${INTEROP_URI:http://localhost:8088}
          predicates:
            # /.well-known/agent-card.json 是 A2A 发现惯例别名：已在 ApiKeyToInternalTokenFilter.isOpen 免鉴权放行，
            # 其余 /interop/** 仍需鉴权。
            - Path=/interop,/interop/**,/.well-known/agent-card.json
        - id: eval
          uri: ${EVAL_URI:http://localhost:8089}
          predicates:
            - Path=/eval,/eval/**
        - id: vision
          uri: ${VISION_URI:http://localhost:8090}
          predicates:
            - Path=/vision,/vision/**
        - id: voice
          uri: ${VOICE_URI:http://localhost:8091}
          predicates:
            - Path=/voice,/voice/**
        - id: order
          uri: ${ORDER_URI:http://localhost:8093}
          predicates:
            - Path=/orders,/orders/**

# 边缘持有 api-key → 租户映射；换发内部 JWT 后下游只认 JWT。
platform:
  security:
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    # 会话令牌：与 auth-service 共用同一密钥（auth 签发登录会话 JWT，edge 验签后换发内部 JWT）。
    session:
      jwt-secret: ${SESSION_JWT_SECRET:dev-only-session-secret-change-me-please-32b}
      access-ttl: ${SESSION_ACCESS_TTL:PT60M}
    api-keys:
      dev-key-acme:
        tenant: acme
        user: alice
        # RBAC 不给既有 api-key 静默增权：保持基线 scopes。管理面（role-admin）/公共库写（public-ingest）
        # 统一走"登录会话 → 角色展开"路径，不挂在 api-key 上。
        scopes: [chat, ingest, approve, agent, channel, eval, vision, voice]
      dev-key-globex:
        tenant: globex
        user: bob
        scopes: [chat]
      dev-key-tenantA-admin:
        tenant: tenantA
        user: analyst-a
        scopes: [chat, analytics]
      dev-key-acme-ingest:
        tenant: acme
        user: alice
        scopes: [chat, ingest]

# ③ Casdoor SSO 身份切换（默认关；灰度期开）。开启后 edge 验 Casdoor access token → 换发内部 JWT，
# 验不过透传给 legacy(session/api-key) filter。scope 由 Casdoor 展开进 token，edge 只透传 + 固定 allowlist
# （与角色数量无关）。tenantId←owner、userId←sub。
edge:
  casdoor:
    enabled: ${EDGE_CASDOOR_ENABLED:true}
    # dual（灰度，验不过透传 legacy）| only（严格 Casdoor-only，非 open path 无有效 token → 401；tenant 恒取 owner）。
    mode: ${EDGE_CASDOOR_MODE:only}
    issuer: ${CASDOOR_ISSUER:http://localhost:8000}
    jwk-set-uri: ${CASDOOR_JWKS:http://localhost:8000/.well-known/jwks}
    # 允许的 Casdoor client_id **base**（方案C Shared Application）；aud=<base> 或 <base>-org-<org>（后者绑 owner==org）。多个逗号分隔。
    audiences: ${CASDOOR_AUDIENCES:ragshared0client00000001}
    tenant-claim: owner
    subject-claim: sub
    # 承载已展开业务能力的 claim（默认 Casdoor permissions 对象数组；scope-name-field 为对象取名字段）
    scope-claim: ${CASDOOR_SCOPE_CLAIM:permissions}
    scope-name-field: ${CASDOOR_SCOPE_NAME_FIELD:name}
    # 固定业务 scope 全集（allowlist，与角色数量无关）
    scope-allowlist: [chat, ingest, approve, agent, channel, eval, vision, voice, analytics, role-admin, public-ingest]

app:
  rate-limit:
    enabled: true
    store: ${RATE_LIMIT_STORE:redis}
    defaults:
      chat: 60
      agent: 20
      stream: 20
      ingest: 5
      eval: 5
      default: 120
    anonymous-multiplier: 0.2

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      probes:
        enabled: true
