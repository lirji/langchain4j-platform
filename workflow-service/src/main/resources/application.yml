server:
  port: 8082

spring:
  application:
    name: workflow-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

platform:
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:4000/v1}
    api-key: ${GATEWAY_API_KEY:sk-litellm-master}
    model-name: ${GATEWAY_MODEL:chat-default}
  security:
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    allow-api-key-fallback: ${INTERNAL_API_KEY_FALLBACK:false}
    authentication-required: ${INTERNAL_AUTH_REQUIRED:true}
    api-keys:
      dev-key-acme:
        tenant: acme
        user: alice
        scopes: [chat, approve]

app:
  workflow:
    enabled: ${WORKFLOW_ENABLED:true}
    datasource:
      url: ${WORKFLOW_DB_URL:jdbc:mysql://localhost:3306/flowable?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true}
      username: ${WORKFLOW_DB_USER:root}
      password: ${WORKFLOW_DB_PASSWORD:root}
    # ServiceTask 内 AI 能力来源（C2 / B9）。
    # mode=http（默认，推荐 prod）：经 tenant/trace 传播的 RestTemplate 调 conversation-service，
    #   workflow 断开对本地 ChatModel 的依赖；HTTP 失败抛异常，交 ServiceTaskDelegates 的 withRetry+降级兜底接管。
    # mode=local：保留 DefaultWorkflowAiClient 本地兜底（零依赖 dev/test 或 conversation 不可达时）。
    ai-client:
      mode: ${WORKFLOW_AI_CLIENT_MODE:http}
      conversation-base-url: ${CONVERSATION_BASE_URL:http://localhost:8081}
      connect-timeout: ${WORKFLOW_AI_CLIENT_CONNECT_TIMEOUT:1s}
      read-timeout: ${WORKFLOW_AI_CLIENT_READ_TIMEOUT:3s}
    # 终态通知发送模式。默认 local 以维持零依赖 dev/test（async-task 需 async-task-service 在跑）；
    # async-task 为一等支持路径、推荐 prod 默认，但为不破坏现有测试此处默认值保持 local。
    terminal-notification:
      mode: ${WORKFLOW_TERMINAL_NOTIFICATION_MODE:local}
      async-task-base-url: ${ASYNC_TASK_BASE_URL:http://localhost:8086}
      async-task-kind: ${WORKFLOW_TERMINAL_ASYNC_TASK_KIND:workflow.terminal}
      fallback-to-local-outbox: ${WORKFLOW_TERMINAL_FALLBACK_LOCAL:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
