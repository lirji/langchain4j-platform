  - id: channel
    title: 渠道 Channel Console
    description: "出站投递 + 回调桥。channel-service。/channel/messages 有真实外部副作用，默认锁定。"
    order: 9
    priority: P2
    service: channel-service
    standalone: high
    capabilities:
      - id: channel.capabilities
        module: channel
        title: 渠道能力发现
        description: "GET /channel/capabilities，列出已配置的出站渠道。"
        method: GET
        path: /channel/capabilities
        requestKind: none
        responseKind: json
        params: []
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
        tags: [core]
      - id: channel.messages.send
        module: channel
        title: 出站投递 (危险)
        description: "POST /channel/messages，ChannelMessageRequest(channel,target,message,metadata)。真实外部投递，展示页默认锁定。"
        method: POST
        path: /channel/messages
        requestKind: json
        responseKind: json
        params:
          - { name: channel, in: body, type: string, required: true, label: 渠道, placeholder: "dingtalk" }
          - { name: target, in: body, type: string, required: true, label: 目标, placeholder: "群/用户 ID" }
          - { name: message, in: body, type: text, required: true, label: 消息内容 }
          - { name: metadata, in: body, type: json, required: false, label: "元数据(JSON)", placeholder: '{}' }
        example: '{"channel":"dingtalk","target":"chat-123","message":"你好"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: destructive
        state: display-only
        executableByDefault: false
      - id: channel.callbacks.async-task
        module: channel
        title: 异步任务回调
        description: "POST /channel/callbacks/async-task，经 header 传任务状态（演示 header 注入）。body 为任意 payload。"
        method: POST
        path: /channel/callbacks/async-task
        requestKind: json
        responseKind: json
        params:
          - { name: X-Async-Task-Id, in: header, type: string, required: false, label: 任务ID(header) }
          - { name: X-Async-Task-Status, in: header, type: string, required: false, label: 任务状态(header), placeholder: "SUCCEEDED" }
        example: '{}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: caution
        state: ready
        executableByDefault: true
      - id: channel.callbacks.workflow
        module: channel
        title: 工作流回调
        description: "POST /channel/callbacks/workflow，经 header 传实例状态。body 为任意 payload。"
        method: POST
        path: /channel/callbacks/workflow
        requestKind: json
        responseKind: json
        params:
          - { name: X-Workflow-Instance-Id, in: header, type: string, required: false, label: 实例ID(header) }
          - { name: X-Workflow-Status, in: header, type: string, required: false, label: 实例状态(header) }
        example: '{}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: caution
        state: ready
        executableByDefault: true
      - id: channel.inbound
        module: channel
        title: 入站事件
        description: "POST /channel/inbound，ChannelInboundEvent（字段以后端为准）+ 可选 X-Channel-Signature header（仅 inboundSignatureEnabled=true 时校验）。"
        method: POST
