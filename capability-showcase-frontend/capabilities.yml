# 能力展示控制台 —— 能力清单（静态 manifest）
# 由 CapabilityCatalogService 用 Jackson-YAML 解析为 CapabilityCatalog（枚举小写/kebab）。
# 所有端点/入参均对照真实 controller 与 platform-protocol DTO 核验，未臆造。
# 覆盖 9 个模块全部能力（P0 骨干+高级 + P1/P2 Workflow/Multimodal/Interop-Eval/Channel）。
# 复杂/嵌套请求体（如 eval cases、dag tasks、mcp arguments）以 type:json 的原样 JSON 字段承载。
version: "1"
modules:
  # ─────────────────────────── P0：对话 ───────────────────────────
  - id: chat
    title: 对话 Chat Console
    description: 同步/流式对话与结构化抽取。conversation-service。
    order: 1
    priority: P0
    service: conversation-service
    standalone: high
    capabilities:
      - id: chat.sync
        module: chat
        title: 单轮对话
        description: "POST /chat，返回 reply/chatId/tenantId/userId。内部 RAG增强/语义缓存/护栏均 flag 化，不影响基础调用。"
        method: POST
        path: /chat
        requestKind: json
        responseKind: json
        params:
          - { name: chatId, in: query, type: string, required: false, label: 会话ID, defaultValue: "default", help: "记忆按 tenantId::chatId 隔离" }
          - { name: message, in: body, type: text, required: true, label: 消息, placeholder: "你好，用一句话介绍这个平台" }
          - { name: category, in: body, type: string, required: false, label: 类目(可选), help: "限定 RAG 检索到该 metadata.category 的文档" }
        example: '{"message":"用一句话介绍这个平台"}'
        requiredScopes: []
        featureFlag: null
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
        tags: [core]
      - id: chat.stream
        module: chat
        title: 流式对话 (SSE)
        description: "POST /chat/stream，token 级 SSE。事件含 message/done/error/blocked/grounding-warning。"
        method: POST
        path: /chat/stream
        requestKind: sse
        responseKind: sse
        params:
          - { name: chatId, in: query, type: string, required: false, label: 会话ID, defaultValue: "default" }
          - { name: message, in: body, type: text, required: true, label: 消息, placeholder: "帮我总结一下 RAG 的流程" }
          - { name: category, in: body, type: string, required: false, label: 类目(可选) }
        example: '{"message":"帮我总结一下 RAG 的流程"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
        sseEvents: [message, done, error, blocked, grounding-warning]
        tags: [core, sse]
      - id: chat.extract
        module: chat
        title: 结构化抽取
        description: "POST /extract?type=ticket，从文本抽取结构化对象。当前注册 ticket 类型。"
        method: POST
        path: /extract
        requestKind: json
        responseKind: json
        params:
          - { name: type, in: query, type: string, required: false, label: 抽取类型, defaultValue: "ticket" }
          - { name: text, in: body, type: text, required: true, label: 待抽取文本, placeholder: "用户反馈：登录页在手机上打不开，很急" }
        example: '{"text":"用户反馈：登录页在手机上打不开，很急"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: chat.auto
        module: chat
        title: 意图路由对话
        description: "POST /chat/auto，LLM-as-Router 先分类再路由。未启用 router 返回禁用提示。"
        method: POST
        path: /chat/auto
        requestKind: json
        responseKind: json
        params:
          - { name: chatId, in: query, type: string, required: false, label: 会话ID, defaultValue: "default" }
          - { name: message, in: body, type: text, required: true, label: 消息, placeholder: "帮我查下退款政策" }
          - { name: category, in: body, type: string, required: false, label: 类目(可选) }
        example: '{"message":"帮我查下退款政策"}'
        requiredScopes: []
        featureFlag: app.conversation.router.enabled
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: chat.cascade
        module: chat
        title: 级联/降级对话
        description: "POST /chat/cascade，便宜模型先答→置信门→升级强模型。需开启 app.chat.cascade.enabled。"
        method: POST
        path: /chat/cascade
        requestKind: json
        responseKind: json
        params:
          - { name: message, in: body, type: text, required: true, label: 消息, placeholder: "解释一下量子纠缠" }
        example: '{"message":"解释一下量子纠缠"}'
        requiredScopes: []
        featureFlag: app.chat.cascade.enabled
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: chat.mcp
        module: chat
        title: MCP 增强对话
        description: "POST /chat/mcp，对话中调用 MCP 工具。需开启 app.conversation.mcp.enabled。"
        method: POST
        path: /chat/mcp
        requestKind: json
        responseKind: json
        params:
          - { name: message, in: body, type: text, required: true, label: 消息, placeholder: "现在几点？" }
        example: '{"message":"现在几点？"}'
        requiredScopes: []
        featureFlag: app.conversation.mcp.enabled
        featureFlagDefault: false
        riskLevel: safe
        state: flag-off
        executableByDefault: true
      - id: chat.memory
        module: chat
        title: 长期记忆对话
        description: "POST /chat/memory，带长期用户画像的对话。需开启 app.conversation.memory.profile.enabled。"
        method: POST
        path: /chat/memory
        requestKind: json
        responseKind: json
        params:
          - { name: chatId, in: query, type: string, required: false, label: 会话ID, defaultValue: "default" }
          - { name: message, in: body, type: text, required: true, label: 消息, placeholder: "记住我喜欢简洁的回答" }
        example: '{"message":"记住我喜欢简洁的回答"}'
        requiredScopes: []
        featureFlag: app.conversation.memory.profile.enabled
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: memory.profile.get
        module: chat
        title: 查看长期画像
        description: "GET /memory/profile，返回当前会话的长期用户画像。需开启 app.conversation.memory.profile.enabled。"
        method: GET
        path: /memory/profile
        requestKind: none
        responseKind: json
        params:
          - { name: chatId, in: query, type: string, required: false, label: 会话ID, defaultValue: "default" }
        requiredScopes: []
        featureFlag: app.conversation.memory.profile.enabled
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: memory.profile.clear
        module: chat
        title: 清除长期画像
        description: "DELETE /memory/profile，清除当前会话的长期用户画像。"
        method: DELETE
        path: /memory/profile
        requestKind: none
        responseKind: json
        params:
          - { name: chatId, in: query, type: string, required: false, label: 会话ID, defaultValue: "default" }
        requiredScopes: []
        featureFlag: app.conversation.memory.profile.enabled
        featureFlagDefault: true
        riskLevel: caution
        state: ready
        executableByDefault: true
      - id: chat.cache.clear
        module: chat
        title: 清语义缓存
        description: "DELETE /chat/cache，按租户清空 L1 语义响应缓存。"
        method: DELETE
        path: /chat/cache
        requestKind: none
        responseKind: json
        params: []
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: caution
        state: ready
        executableByDefault: true

  # ─────────────────────────── P0：知识库 ───────────────────────────
  - id: rag
    title: 知识库 RAG Workspace
    description: 文档入库与检索。knowledge-service。embedding / 向量库 / 混排开关随部署而定，检索台顶部实时显示当前形态（默认零依赖 HashEmbedding，可配 qdrant/nomic 真实语义）。
    order: 2
    priority: P0
    service: knowledge-service
    standalone: high
    capabilities:
      - id: rag.query
        module: rag
        title: 知识检索
        description: "POST /rag/query，KnowledgeQueryRequest。当前 embedding / 向量库以检索台顶部实时状态为准（默认零依赖 HashEmbedding，可配 qdrant/nomic 真实语义）。"
        method: POST
        path: /rag/query
        requestKind: json
        responseKind: json
        params:
          - { name: query, in: body, type: text, required: true, label: 查询, placeholder: "退款政策是什么？" }
          - { name: topK, in: body, type: integer, required: false, label: TopK, defaultValue: 5, min: 1, max: 50 }
          - { name: minScore, in: body, type: number, required: false, label: 最低分, min: 0, max: 1 }
          - { name: category, in: body, type: string, required: false, label: 类目 }
        example: '{"query":"退款政策是什么？","topK":5}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready-degraded
        executableByDefault: true
        tags: [core]
      - id: rag.upload.file
        module: rag
        title: 上传文档(文件·当前租户)
        description: "POST /rag/documents (multipart file)，写当前租户库，需 ingest scope。"
        method: POST
        path: /rag/documents
        requestKind: multipart
        responseKind: json
        params:
          - { name: file, in: form-data, type: file, required: true, label: 文件, accept: ".txt,.md,.pdf" }
        requiredScopes: [ingest]
        featureFlagDefault: true
        riskLevel: caution
        state: scope-required
        executableByDefault: true
      - id: rag.upload.file.shared
        module: rag
        title: 上传文档(文件·共享库)
        description: "POST /rag/documents?visibility=public，写共享库（全租户可检索），需 public-ingest scope。"
        method: POST
        path: /rag/documents?visibility=public
        requestKind: multipart
        responseKind: json
        params:
          - { name: file, in: form-data, type: file, required: true, label: 文件, accept: ".txt,.md,.pdf" }
        requiredScopes: [public-ingest]
        featureFlagDefault: true
        riskLevel: caution
        state: scope-required
        executableByDefault: true
      - id: rag.upload.json
        module: rag
        title: 上传文档(JSON·当前租户)
        description: "POST /rag/documents (JSON title/text/category)，写当前租户库，需 ingest scope。"
        method: POST
        path: /rag/documents
        requestKind: json
        responseKind: json
        params:
          - { name: title, in: body, type: string, required: false, label: 标题 }
          - { name: text, in: body, type: text, required: true, label: 正文 }
          - { name: category, in: body, type: string, required: false, label: 类目 }
        example: '{"title":"退款政策","text":"下单 7 天内可无理由退款……","category":"policy"}'
        requiredScopes: [ingest]
        featureFlagDefault: true
        riskLevel: caution
        state: scope-required
        executableByDefault: true
      - id: rag.upload.json.shared
        module: rag
        title: 上传文档(JSON·共享库)
        description: "POST /rag/documents?visibility=public (JSON title/text/category)，写共享库（全租户可检索），需 public-ingest scope。"
        method: POST
        path: /rag/documents?visibility=public
        requestKind: json
        responseKind: json
        params:
          - { name: title, in: body, type: string, required: false, label: 标题 }
          - { name: text, in: body, type: text, required: true, label: 正文 }
          - { name: category, in: body, type: string, required: false, label: 类目 }
        example: '{"title":"全租户公告","text":"共享知识库示例文本……","category":"policy"}'
        requiredScopes: [public-ingest]
        featureFlagDefault: true
        riskLevel: caution
        state: scope-required
        executableByDefault: true
      - id: rag.documents.list
        module: rag
        title: 文档列表
        description: "GET /rag/documents，列出当前租户文档。"
        method: GET
        path: /rag/documents
        requestKind: none
        responseKind: json
        params: []
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: rag.documents.delete
        module: rag
        title: 删除文档
        description: "DELETE /rag/documents/{docId}，删除单个文档。"
        method: DELETE
        path: /rag/documents/{docId}
        requestKind: none
        responseKind: json
        params:
          - { name: docId, in: path, type: string, required: true, label: 文档ID }
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: caution
        state: ready
        executableByDefault: true
      - id: rag.documents.get
        module: rag
        title: 文档详情
        description: "GET /rag/documents/{docId}，查看单个文档元数据。"
        method: GET
        path: /rag/documents/{docId}
        requestKind: none
        responseKind: json
        params:
          - { name: docId, in: path, type: string, required: true, label: 文档ID }
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: rag.obsidian.import
        module: rag
        title: Obsidian 导入
        description: "POST /rag/obsidian/import (multipart file)，导入 Obsidian 笔记入库。"
        method: POST
        path: /rag/obsidian/import
        requestKind: multipart
        responseKind: json
        params:
          - { name: file, in: form-data, type: file, required: true, label: 笔记文件, accept: ".md,.zip" }
          - { name: category, in: query, type: string, required: false, label: 类目(可选) }
        requiredScopes: [ingest]
        featureFlagDefault: true
        riskLevel: caution
        state: scope-required
        executableByDefault: true
      - id: rag.graph.query
        module: rag
        title: GraphRAG 查询
        description: "POST /rag/graph/query，GraphQueryRequest（字段以后端 record 为准）。需开启 app.rag.graph.enabled。"
        method: POST
        path: /rag/graph/query
        requestKind: json
        responseKind: json
        params:
          - { name: query, in: body, type: text, required: true, label: 查询, placeholder: "谁负责退款审批？" }
        example: '{"query":"谁负责退款审批？"}'
        requiredScopes: []
        featureFlag: app.rag.graph.enabled
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: rag.graph.entities
        module: rag
        title: GraphRAG 实体
        description: "GET /rag/graph/entities，按类目列出图谱实体。需开启 app.rag.graph.enabled。"
        method: GET
        path: /rag/graph/entities
        requestKind: none
        responseKind: json
        params:
          - { name: category, in: query, type: string, required: false, label: 类目(可选) }
        requiredScopes: []
        featureFlag: app.rag.graph.enabled
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true

  # ─────────────────────────── P0：Agent ───────────────────────────
  - id: agent
    title: 智能体 Agent Lab
    description: ReAct 目标执行与异步任务流。agent-service。（DAG/链/投票/反思等高级能力二期补表单。）
    order: 3
    priority: P0
    service: agent-service
    standalone: high
    capabilities:
      - id: agent.run
        module: agent
        title: 同步跑目标 (ReAct)
        description: "POST /agent/run，AgentRunRequest(goal, webhookUrl)。"
        method: POST
        path: /agent/run
        requestKind: json
        responseKind: json
        params:
          - { name: goal, in: body, type: text, required: true, label: 目标, placeholder: "查一下今天的日期并算出距离年底还有多少天" }
          - { name: webhookUrl, in: body, type: string, required: false, label: 回调URL(可选) }
        example: '{"goal":"查一下今天的日期并算出距离年底还有多少天"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
        tags: [core]
      - id: agent.run.async
        module: agent
        title: 异步跑目标
        description: "POST /agent/run/async，返回 taskId，配合 /agent/tasks/{id}/stream 观测。"
        method: POST
        path: /agent/run/async
        requestKind: json
        responseKind: json
        params:
          - { name: goal, in: body, type: text, required: true, label: 目标 }
          - { name: webhookUrl, in: body, type: string, required: false, label: 回调URL(可选) }
        example: '{"goal":"分三步总结这个平台的能力"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.tasks.list
        module: agent
        title: 我的 Agent 任务
        description: "GET /agent/tasks，列出当前租户 Agent 任务。"
        method: GET
        path: /agent/tasks
        requestKind: none
        responseKind: json
        params: []
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.tasks.get
        module: agent
        title: Agent 任务详情
        description: "GET /agent/tasks/{taskId}。"
        method: GET
        path: /agent/tasks/{taskId}
        requestKind: none
        responseKind: json
        params:
          - { name: taskId, in: path, type: string, required: true, label: 任务ID }
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.tasks.stream
        module: agent
        title: Agent 任务流 (SSE)
        description: "GET /agent/tasks/{taskId}/stream，SSE 观测执行步骤。"
        method: GET
        path: /agent/tasks/{taskId}/stream
        requestKind: sse
        responseKind: sse
        params:
          - { name: taskId, in: path, type: string, required: true, label: 任务ID }
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
        sseEvents: [message, done, error]
        tags: [sse]
      - id: agent.tasks.cancel
        module: agent
        title: 取消 Agent 任务
        description: "DELETE /agent/tasks/{taskId}。"
        method: DELETE
        path: /agent/tasks/{taskId}
        requestKind: none
        responseKind: json
        params:
          - { name: taskId, in: path, type: string, required: true, label: 任务ID }
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: caution
        state: ready
        executableByDefault: true
      - id: agent.dag.run
        module: agent
        title: 多 Agent DAG
        description: "POST /agent/dag/run，AgentDagRunRequest(goal, tasks[], webhookUrl)。"
        method: POST
        path: /agent/dag/run
        requestKind: json
        responseKind: json
        params:
          - { name: goal, in: body, type: text, required: false, label: 目标 }
          - { name: tasks, in: body, type: json, required: false, label: "任务 DAG(JSON 数组)", placeholder: '[{"id":"t1","goal":"..."}]' }
          - { name: webhookUrl, in: body, type: string, required: false, label: 回调URL(可选) }
        example: '{"goal":"调研并总结平台能力"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.dag.plan-run
        module: agent
        title: DAG 自动规划执行
        description: "POST /agent/dag/plan-run，由 goal 自动规划 DAG 再执行。"
        method: POST
        path: /agent/dag/plan-run
        requestKind: json
        responseKind: json
        params:
          - { name: goal, in: body, type: text, required: true, label: 目标, placeholder: "对比三家云厂商的对象存储定价" }
        example: '{"goal":"对比三家云厂商的对象存储定价"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.dag.run.async
        module: agent
        title: DAG 异步执行
        description: "POST /agent/dag/run/async，返回 taskId，配合 /agent/tasks/{id}/stream。"
        method: POST
        path: /agent/dag/run/async
        requestKind: json
        responseKind: json
        params:
          - { name: goal, in: body, type: text, required: false, label: 目标 }
          - { name: tasks, in: body, type: json, required: false, label: "任务 DAG(JSON 数组)" }
          - { name: webhookUrl, in: body, type: string, required: false, label: 回调URL(可选) }
        example: '{"goal":"调研并总结平台能力"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.dag.plan-run.async
        module: agent
        title: DAG 规划异步执行
        description: "POST /agent/dag/plan-run/async。"
        method: POST
        path: /agent/dag/plan-run/async
        requestKind: json
        responseKind: json
        params:
          - { name: goal, in: body, type: text, required: true, label: 目标 }
        example: '{"goal":"对比三家云厂商的对象存储定价"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.chain
        module: agent
        title: 链式编排
        description: "POST /agent/chain，ChainRunRequest(input)。未配置 app.agent.chaining.steps 时返回 400。"
        method: POST
        path: /agent/chain
        requestKind: json
        responseKind: json
        params:
          - { name: input, in: body, type: text, required: true, label: 输入, placeholder: "把这段话翻译成英文再总结" }
        example: '{"input":"把这段话翻译成英文再总结"}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.vote
        module: agent
        title: 投票编排
        description: "POST /agent/vote，VoteRequest(question, n)。n 路采样投票取多数。"
        method: POST
        path: /agent/vote
        requestKind: json
        responseKind: json
        params:
          - { name: question, in: body, type: text, required: true, label: 问题, placeholder: "17 是质数吗？" }
          - { name: n, in: body, type: integer, required: false, label: 采样路数, defaultValue: 3, min: 1, max: 9 }
        example: '{"question":"17 是质数吗？","n":3}'
        requiredScopes: []
        featureFlagDefault: true
        riskLevel: safe
        state: ready
        executableByDefault: true
      - id: agent.reflexive
        module: agent
        title: 反思编排
        description: "POST /agent/reflexive，ReflexionRequest(question)。自我批判迭代。"
        method: POST
        path: /agent/reflexive
        requestKind: json
        responseKind: json
        params:
