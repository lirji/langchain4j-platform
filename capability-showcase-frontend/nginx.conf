server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── 安全响应头（仅 prod 静态站点；dev 用 vite，无此文件，故 dev 不加 CSP）──
  # CSP：oidc-client-ts 从浏览器直连 Casdoor（discovery/jwks/token 走 connect-src；prompt=none
  # 静默续期隐藏 iframe 走 frame-src）；业务请求跨域直连 edge 走 connect-src。frame-ancestors 'self'
  # 防点击劫持。⚠️ 下方 http://localhost:8000(Casdoor) / http://localhost:8080(edge) 是 compose 默认值，
  # 生产部署【必须】替换为真实 Casdoor issuer 与 edge 域名（或用 envsubst 在容器启动时注入）。
  # 该 add_header 在 server 层，location /（无自身 add_header）继承之 → index.html 文档受 CSP 约束。
  # CSP 的 connect-src(浏览器直连 edge/Casdoor) 与 frame-src(Casdoor 静默续期 iframe) 由容器启动时 envsubst 注入：
  # 源值来自 compose 环境变量 ${CSP_EDGE_ORIGIN} / ${CSP_CASDOOR_ORIGIN}，与构建期 VITE_EDGE_BASE_URL / VITE_CASDOOR_ISSUER
  # 同源（同一 SHOWCASE_* 变量），端口不再漂移。NGINX_ENVSUBST_FILTER=^CSP_ 保证只替换 CSP_* 而不动 nginx 运行变量
  # ($host/$uri/$request_uri/$edge_upstream 等)。本文件是 nginx 官方镜像的模板，COPY 到 /etc/nginx/templates/*.template。
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ${CSP_CASDOOR_ORIGIN} ${CSP_EDGE_ORIGIN}; frame-src ${CSP_CASDOOR_ORIGIN}; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # 静态资源长缓存
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # docker 内嵌 DNS：使上游按变量在【请求时】解析，而非启动时——避免网关容器晚于本容器就绪时
  # nginx 因 "host not found in upstream" 直接启动失败，也让网关重启后无需重启本容器。
  resolver 127.0.0.11 valid=10s ipv6=off;

  # 公开健康端点：门户不携带凭据跨域读取状态，并以 edge 就绪作为入口可用条件。
  location = /healthz {
    set $edge_health_upstream edge-gateway:8080;
    proxy_pass http://$edge_health_upstream/actuator/health;
    proxy_connect_timeout 1s;
    proxy_read_timeout 2s;
    access_log off;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # 登录端点同源反代到边缘网关：使刷新令牌 httpOnly cookie 成为第一方（SameSite=Lax），无需 CORS/凭证跨域。
  location /auth/ {
    set $edge_upstream edge-gateway:8080;   # 变量 → 惰性解析
    proxy_pass http://$edge_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA history 路由回退：任意未命中路径回退到 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
