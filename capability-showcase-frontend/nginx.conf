server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # 静态资源长缓存
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # docker 内嵌 DNS：使上游按变量在【请求时】解析，而非启动时——避免网关容器晚于本容器就绪时
  # nginx 因 "host not found in upstream" 直接启动失败，也让网关重启后无需重启本容器。
  resolver 127.0.0.11 valid=10s ipv6=off;

  # 登录端点同源反代到边缘网关：使刷新令牌 httpOnly cookie 成为第一方（SameSite=Lax），无需 CORS/凭证跨域。
  location /auth/ {
    set $edge_upstream edge-gateway:8080;   # 变量 → 惰性解析
    proxy_pass http://$edge_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA history 路由回退：任意未命中路径回退到 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
