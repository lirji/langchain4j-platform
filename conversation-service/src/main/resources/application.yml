server:
  port: 8081

spring:
  application:
    name: conversation-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

# 外部 AI 网关（LiteLLM）。provider/model 选择与 failover 在 LiteLLM config.yaml 里。
platform:
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:4000/v1}
    api-key: ${GATEWAY_API_KEY:sk-litellm-master}
    model-name: ${GATEWAY_MODEL:chat-default}
  security:
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    # 本地直连调试用的 api key → 租户映射（生产下游只信 JWT，可关 allow-api-key-fallback）
    allow-api-key-fallback: true
    api-keys:
      dev-key-acme:
        tenant: acme
        user: alice
        scopes: [chat, approve]

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tokenbudget,cost
  endpoint:
    health:
      probes:
        enabled: true

app:
  conversation:
    rag:
      enabled: ${CONVERSATION_RAG_ENABLED:false}
      knowledge-base-url: ${KNOWLEDGE_BASE_URL:http://localhost:8084}
      top-k: ${CONVERSATION_RAG_TOP_K:5}
      min-score: ${CONVERSATION_RAG_MIN_SCORE:0.0}
      category: ${CONVERSATION_RAG_CATEGORY:}
      max-context-chars: ${CONVERSATION_RAG_MAX_CONTEXT_CHARS:4000}
      connect-timeout: ${CONVERSATION_RAG_CONNECT_TIMEOUT:1s}
      read-timeout: ${CONVERSATION_RAG_READ_TIMEOUT:3s}
    # L1 语义缓存（应用侧 / 问题级 / 租户桶 / pre-RAG）。默认关闭，对现有 /chat 行为零影响。
    semantic-cache:
      enabled: ${CONVERSATION_SEMANTIC_CACHE_ENABLED:false}
      threshold: ${CONVERSATION_SEMANTIC_CACHE_THRESHOLD:0.95}
      max-entries-per-tenant: ${CONVERSATION_SEMANTIC_CACHE_MAX_ENTRIES:1000}
      store: ${CONVERSATION_SEMANTIC_CACHE_STORE:in-memory}
      embedding:
        provider: ${CONVERSATION_SEMANTIC_CACHE_EMBEDDING_PROVIDER:hash}
        model-name: ${CONVERSATION_SEMANTIC_CACHE_EMBEDDING_MODEL:embedding-default}
      redis:
        ttl: ${CONVERSATION_SEMANTIC_CACHE_REDIS_TTL:0s}
  # Model Cascade（便宜模型先答 → 低置信才升级强模型）。默认关闭，对现有 /chat 行为零影响。
  # cheap-model / strong-model 为 LiteLLM model_list 里的逻辑模型名；留空退化为网关默认模型。
  chat:
    cascade:
      enabled: ${CHAT_CASCADE_ENABLED:false}
      cheap-model: ${CHAT_CASCADE_CHEAP_MODEL:}
      strong-model: ${CHAT_CASCADE_STRONG_MODEL:}
      confidence-threshold: ${CHAT_CASCADE_CONFIDENCE_THRESHOLD:0.6}
      min-answer-chars: ${CHAT_CASCADE_MIN_ANSWER_CHARS:8}
      self-rating: ${CHAT_CASCADE_SELF_RATING:false}
  token-budget:
    enabled: true
    store: in-memory
    timezone: Asia/Shanghai
  cost:
    enabled: false
