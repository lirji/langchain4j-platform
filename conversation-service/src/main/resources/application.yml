server:
  port: 8081

spring:
  application:
    name: conversation-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

# 外部 AI 网关（LiteLLM）。provider/model 选择与 failover 在 LiteLLM config.yaml 里。
platform:
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:4000/v1}
    api-key: ${GATEWAY_API_KEY:sk-litellm-master}
    model-name: ${GATEWAY_MODEL:chat-default}
    # token 级流式 StreamingChatModel（供 /chat/stream）。默认开；无流式需求可置 false 省一个 Bean。
    streaming:
      enabled: ${GATEWAY_STREAMING_ENABLED:true}
  security:
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    # 本地直连调试用的 api key → 租户映射（生产下游只信 JWT，可关 allow-api-key-fallback）
    allow-api-key-fallback: ${INTERNAL_API_KEY_FALLBACK:false}
    authentication-required: ${INTERNAL_AUTH_REQUIRED:true}
    api-keys:
      dev-key-acme:
        tenant: acme
        user: alice
        scopes: [chat, approve]

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tokenbudget,cost
  endpoint:
    health:
      probes:
        enabled: true

app:
  conversation:
    # 外置化对话助手风格（对齐单体 app.assistant）：系统提示的 language/tone/citation-policy/extra 挪到配置，
    # 改 yml + 重启即可调，不改 Java。overrides 按 LiteLLM 逻辑模型名（platform.gateway.model-name）覆盖，
    # 字段级 null 回退默认、空串清空。默认值等价现有系统提示行为。
    assistant:
      language: ${CONVERSATION_ASSISTANT_LANGUAGE:中文}
      tone: ${CONVERSATION_ASSISTANT_TONE:简洁，1–2 句话答完，必要时再展开}
      # citation-policy / extra 用代码内默认（互斥三档引用策略 / 空）；如需覆盖在此配置。
      overrides: {}
      #   deepseek-chat:            # key = platform.gateway.model-name（LiteLLM 逻辑模型名）
      #     tone: "简洁，可更口语，中文表达自然"
      #   claude-default:
      #     tone: "分组事实时用 <fact>...</fact> 标签，Claude 对结构化标签更敏感"
      #   qwen-small:
      #     tone: "每句独立成段，避免长复合句；最多 3 句"
    rag:
      enabled: ${CONVERSATION_RAG_ENABLED:true}
      knowledge-base-url: ${KNOWLEDGE_BASE_URL:http://localhost:8084}
      top-k: ${CONVERSATION_RAG_TOP_K:5}
      min-score: ${CONVERSATION_RAG_MIN_SCORE:0.0}
      category: ${CONVERSATION_RAG_CATEGORY:}
      max-context-chars: ${CONVERSATION_RAG_MAX_CONTEXT_CHARS:4000}
      connect-timeout: ${CONVERSATION_RAG_CONNECT_TIMEOUT:1s}
      read-timeout: ${CONVERSATION_RAG_READ_TIMEOUT:3s}
    # History-aware 检索（对齐单体 CompressingQueryTransformer）：用会话记忆历史把带指代的追问
    # （「它跟 X 啥区别」）压缩为自包含检索 query 再检索；只影响送知识库的 query，用户消息原样进记忆。
    # 默认开（每轮 /chat 多一次 LLM 压缩调用；置 false 关闭）。
    history-aware:
      enabled: ${CONVERSATION_HISTORY_AWARE_ENABLED:true}
      max-history-messages: ${CONVERSATION_HISTORY_AWARE_MAX_HISTORY_MESSAGES:10}
    # 多轮 Chat Memory（对齐单体 memory/）。默认开启、内存滑窗，零外部依赖；redis 档多副本共享 + 重启不丢。
    # window-mode: messages(最近 N 条) | tokens(近似 token 窗) | summary(旧消息 LLM 压缩为摘要，长对话保早期要点)
    memory:
      store: ${CONVERSATION_MEMORY_STORE:in-memory}          # in-memory | redis
      window-mode: ${CONVERSATION_MEMORY_WINDOW_MODE:messages}  # messages | tokens | summary
      max-messages: ${CONVERSATION_MEMORY_MAX_MESSAGES:20}
      max-tokens: ${CONVERSATION_MEMORY_MAX_TOKENS:2000}     # tokens 档用
      token-model: ${CONVERSATION_MEMORY_TOKEN_MODEL:gpt-4o-mini}  # tokens 档 tokenizer 依据
      redis-ttl: ${CONVERSATION_MEMORY_REDIS_TTL:P7D}        # redis 档会话 TTL（ISO-8601，如 P7D / PT12H）
      # 长期记忆/用户画像（对齐单体 memory/profile）：跨会话抽取用户持久事实，对话前作为 context 新鲜注入。
      # 端点 /chat/memory、GET/DELETE /memory/profile。默认开（每轮多一次 temp=0 抽取；置 false 关闭）。
      profile:
        enabled: ${CONVERSATION_MEMORY_PROFILE_ENABLED:true}
        store: ${CONVERSATION_MEMORY_PROFILE_STORE:in-memory}  # in-memory（redis 变体待补）
        max-items: ${CONVERSATION_MEMORY_PROFILE_MAX_ITEMS:50}
        recall-limit: ${CONVERSATION_MEMORY_PROFILE_RECALL_LIMIT:12}
        async: ${CONVERSATION_MEMORY_PROFILE_ASYNC:true}
    # Grounding 事后校验（对齐单体 ai/grounding，warn 模式）：答案 vs RAG 来源核对，
    # Layer0 伪造引用（[doc=ID] 不在来源）+ Layer1 faithfulness 打分 < 阈值 → 在答案末尾追加可信度提示后缀
    # （不改写、不拒答）。每轮 RAG 回答多一次 temp=0 判官调用；默认开（置 false 关闭）。
    grounding:
      enabled: ${CONVERSATION_GROUNDING_ENABLED:true}
      threshold: ${CONVERSATION_GROUNDING_THRESHOLD:0.7}
    # LLM-as-Router（对齐单体 ai/routing）：分类 query（RAG/TOOL/CHAT）后分派——订单 TOOL 走 order-service，
    # RAG 走检索，其它 TOOL/CHAT 裸答。
    # 端点 POST /chat/auto。非订单请求每轮多一次 temp=0 分类调用；默认开（置 false 关闭）。
    router:
      enabled: ${CONVERSATION_ROUTER_ENABLED:true}
      order:
        enabled: ${CONVERSATION_ROUTER_ORDER_ENABLED:true}
        base-url: ${ORDER_BASE_URL:http://localhost:8093}
        connect-timeout: ${CONVERSATION_ROUTER_ORDER_CONNECT_TIMEOUT:1s}
        read-timeout: ${CONVERSATION_ROUTER_ORDER_READ_TIMEOUT:5s}
    # MCP 驱动对话（对齐单体 ai/mcp）：工具全部来自 MCP server。端点 POST /chat/mcp。默认关。
    mcp:
      enabled: ${CONVERSATION_MCP_ENABLED:false}
      transport: ${CONVERSATION_MCP_TRANSPORT:stdio}   # stdio | http
      log-events: ${CONVERSATION_MCP_LOG_EVENTS:true}
      stdio:
        command: ${CONVERSATION_MCP_STDIO_COMMAND:}    # 逗号分隔的进程命令，如 "npx,-y,@modelcontextprotocol/server-everything"
      http:
        url: ${CONVERSATION_MCP_HTTP_URL:http://localhost:3001/mcp}
    # 视觉对话（对齐单体 ai/vision）：/chat/vision 把图片+问题委托给 vision-service（视觉能力已在那边）。默认开（置 false 关闭）。
    vision:
      enabled: ${CONVERSATION_VISION_ENABLED:true}
      vision-base-url: ${CONVERSATION_VISION_BASE_URL:http://localhost:8090}
      connect-timeout: ${CONVERSATION_VISION_CONNECT_TIMEOUT:1s}
      read-timeout: ${CONVERSATION_VISION_READ_TIMEOUT:60s}
    # 对话护栏（移植单体 PromptInjection/PII）。默认全开（安全合规）；置 false 可关、退回零回归。
    guardrail:
      injection:
        enabled: ${CONVERSATION_GUARDRAIL_INJECTION_ENABLED:true}
        mode: ${CONVERSATION_GUARDRAIL_INJECTION_MODE:block}   # block(拒答) | sanitize(剥离控制token) | audit(仅记日志放行)
      pii:
        enabled: ${CONVERSATION_GUARDRAIL_PII_ENABLED:true}    # 输出里的 email/手机号/身份证就地脱敏
    # L1 语义缓存（应用侧 / 问题级 / 租户桶 / pre-RAG）。默认开；置 false 关闭时对现有 /chat 行为零影响。
    semantic-cache:
      enabled: ${CONVERSATION_SEMANTIC_CACHE_ENABLED:true}
      threshold: ${CONVERSATION_SEMANTIC_CACHE_THRESHOLD:0.95}
      max-entries-per-tenant: ${CONVERSATION_SEMANTIC_CACHE_MAX_ENTRIES:1000}
      store: ${CONVERSATION_SEMANTIC_CACHE_STORE:redis}
      embedding:
        provider: ${CONVERSATION_SEMANTIC_CACHE_EMBEDDING_PROVIDER:hash}
        model-name: ${CONVERSATION_SEMANTIC_CACHE_EMBEDDING_MODEL:embedding-default}
      redis:
        ttl: ${CONVERSATION_SEMANTIC_CACHE_REDIS_TTL:0s}
  # Model Cascade（便宜模型先答 → 低置信才升级强模型）。默认开；置 false 关闭时对现有 /chat 行为零影响。
  # cheap-model / strong-model 为 LiteLLM model_list 里的逻辑模型名；留空退化为网关默认模型。
  chat:
    cascade:
      enabled: ${CHAT_CASCADE_ENABLED:true}
      cheap-model: ${CHAT_CASCADE_CHEAP_MODEL:}
      strong-model: ${CHAT_CASCADE_STRONG_MODEL:}
      confidence-threshold: ${CHAT_CASCADE_CONFIDENCE_THRESHOLD:0.6}
      min-answer-chars: ${CHAT_CASCADE_MIN_ANSWER_CHARS:8}
      self-rating: ${CHAT_CASCADE_SELF_RATING:false}
  token-budget:
    enabled: true
    store: ${TOKEN_BUDGET_STORE:redis}
    timezone: Asia/Shanghai
  cost:
    enabled: false
