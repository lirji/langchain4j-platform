server:
  port: 8092

spring:
  application:
    name: auth-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

platform:
  security:
    # 内部 JWT：/auth/me 走"内部 JWT → TenantContext"链路（edge 换发）；本地直连调试可留 fallback。
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    allow-api-key-fallback: true
    # 会话令牌：与 edge-gateway 共用同一密钥（edge 验签、auth 签发）。
    session:
      jwt-secret: ${SESSION_JWT_SECRET:dev-only-session-secret-change-me-please-32b}
      access-ttl: ${SESSION_ACCESS_TTL:PT60M}
      refresh-ttl: ${SESSION_REFRESH_TTL:P7D}

app:
  auth:
    store: ${AUTH_STORE:in-memory}
    demo-password: ${AUTH_DEMO_PASSWORD:demo12345}
    # RBAC 总开关（默认关闭，登录只用直配 scopes）。admin-writes 独立灰度：只读先开、写后开。
    # bootstrap-admin-users：迁移/种子时确保拥有 admin 角色的用户名（生产必须显式配置真实名单）。
    rbac:
      enabled: ${AUTH_RBAC_ENABLED:false}
      admin-writes-enabled: ${AUTH_RBAC_ADMIN_WRITES_ENABLED:false}
      # 继承式 RBAC 第三段灰度（默认关）：开后把租户基础角色 + 用户组角色并入有效 scopes
      # （有效 = 租户基础 ∪ 组 ∪ 个人角色 ∪ 直配）。关时行为与两级逐字节一致，可先建表配好绑定再开。
      inheritance-enabled: ${AUTH_RBAC_INHERITANCE_ENABLED:false}
      bootstrap-admin-users: ${AUTH_RBAC_BOOTSTRAP_ADMIN_USERS:alice}
    # 种子开关：false 时空库不自动灌 demo 账号/角色（生产库走受控 SQL 建首个用户）。
    seed:
      enabled: ${AUTH_SEED_ENABLED:true}
    # 密码策略（注册/建户/改密共用）。默认最短 6 与既有一致；生产可提升。
    password-policy:
      min-length: ${AUTH_PASSWORD_MIN_LENGTH:6}
      max-length: ${AUTH_PASSWORD_MAX_LENGTH:128}
    # 客户端 IP：默认只取 remoteAddr；仅当 edge/Ingress 已覆盖外部 XFF 时才可开 trust-forwarded-for。
    client-ip:
      trust-forwarded-for: ${AUTH_TRUST_FORWARDED_FOR:false}
    cookie:
      name: ${AUTH_COOKIE_NAME:refresh_token}
      path: ${AUTH_COOKIE_PATH:/auth}
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${AUTH_COOKIE_DOMAIN:}
    throttle:
      enabled: ${AUTH_THROTTLE_ENABLED:true}
      max-attempts: ${AUTH_THROTTLE_MAX_ATTEMPTS:5}
      window: ${AUTH_THROTTLE_WINDOW:PT1M}
    # 自助注册（默认关闭）。开启后 POST /auth/register 建号；rules 按邮箱域自动映射租户+角色，
    # 未命中用 default-tenant/default-role。示例规则可按需增删。
    registration:
      enabled: ${AUTH_REGISTRATION_ENABLED:false}
      default-tenant: ${AUTH_REGISTRATION_DEFAULT_TENANT:public}
      default-role: ${AUTH_REGISTRATION_DEFAULT_ROLE:viewer}
      # 按 IP 的注册节流（成功/失败都计数，避免换 username 绕过；maxKeys 防随机 IP 撑爆内存）。
      throttle:
        enabled: ${AUTH_REGISTRATION_THROTTLE_ENABLED:true}
        max-attempts: ${AUTH_REGISTRATION_MAX_ATTEMPTS:10}
        window: ${AUTH_REGISTRATION_WINDOW:PT10M}
        max-keys: ${AUTH_REGISTRATION_MAX_KEYS:10000}
      # 域→租户+角色的自动映射规则：默认不内置（示例域曾在通用配置里，生产误开注册会错误授权）。
      # 需要时在部署专用 yaml / config-server 配置 app.auth.registration.rules，或用 default-tenant/role 兜底。
    datasource:
      url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true}
      username: ${AUTH_DB_USER:root}
      password: ${AUTH_DB_PASSWORD:}
      driver-class-name: ${AUTH_DB_DRIVER:com.mysql.cj.jdbc.Driver}
      maximum-pool-size: ${AUTH_DB_MAX_POOL_SIZE:8}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
