server:
  port: 8085

spring:
  application:
    name: agent-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

platform:
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:4000/v1}
    api-key: ${GATEWAY_API_KEY:sk-litellm-master}
    model-name: ${GATEWAY_MODEL:chat-default}
  security:
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    allow-api-key-fallback: true
    api-keys:
      dev-key-acme:
        tenant: acme
        user: alice
        scopes: [chat, agent]

app:
  agent:
    enabled: ${AGENT_ENABLED:true}
    max-steps: ${AGENT_MAX_STEPS:8}
    max-wall-clock-ms: ${AGENT_MAX_WALL_CLOCK_MS:0}
    max-tokens: ${AGENT_MAX_TOKENS:0}
    brain-max-retries: ${AGENT_BRAIN_MAX_RETRIES:1}
    brain-retry-backoff-ms: ${AGENT_BRAIN_RETRY_BACKOFF_MS:0}
    max-repeats: ${AGENT_MAX_REPEATS:3}
    loop-window: ${AGENT_LOOP_WINDOW:6}
    max-scratchpad-chars: ${AGENT_MAX_SCRATCHPAD_CHARS:4000}
    history-window: ${AGENT_HISTORY_WINDOW:6}
    allow-delegation: ${AGENT_ALLOW_DELEGATION:true}
    max-depth: ${AGENT_MAX_DEPTH:1}
    code-exec:
      enabled: ${AGENT_CODE_EXEC_ENABLED:false}
      sandbox: ${AGENT_CODE_EXEC_SANDBOX:subprocess}
      timeout-ms: ${AGENT_CODE_EXEC_TIMEOUT_MS:3000}
      max-output-chars: ${AGENT_CODE_EXEC_MAX_OUTPUT_CHARS:2000}
      max-source-chars: ${AGENT_CODE_EXEC_MAX_SOURCE_CHARS:4000}
      block-unsafe-apis: ${AGENT_CODE_EXEC_BLOCK_UNSAFE_APIS:true}
      max-heap-mb: ${AGENT_CODE_EXEC_MAX_HEAP_MB:64}
      java-executable: ${AGENT_CODE_EXEC_JAVA_EXECUTABLE:}
    mcp:
      enabled: ${AGENT_MCP_ENABLED:false}
      transport: ${AGENT_MCP_TRANSPORT:stdio}
      log-events: ${AGENT_MCP_LOG_EVENTS:false}
      stdio:
        command: ${AGENT_MCP_STDIO_COMMAND:}
      http:
        url: ${AGENT_MCP_HTTP_URL:http://localhost:3001/mcp}
    browser:
      enabled: ${AGENT_BROWSER_ENABLED:false}
    # 视觉后端（独立 vision-service）。browser_see 动作双门控在 browser.enabled + vision.enabled 同时 true。
    # vision 默认开（视觉 RestTemplate/客户端装配）；browser_see 仍需 browser.enabled=true（默认关）才出现在工具清单。
    vision:
      enabled: ${AGENT_VISION_ENABLED:true}
      base-url: ${VISION_BASE_URL:http://localhost:8090}
      read-timeout: ${AGENT_VISION_READ_TIMEOUT:60s}
    knowledge:
      base-url: ${KNOWLEDGE_BASE_URL:http://localhost:8084}
      top-k: ${AGENT_RAG_TOP_K:5}
      min-score: ${AGENT_RAG_MIN_SCORE:0.0}
      category: ${AGENT_RAG_CATEGORY:}
    analytics:
      base-url: ${ANALYTICS_BASE_URL:http://localhost:8083}
      enabled: ${AGENT_ANALYTICS_ENABLED:true}
    # 业务流程智能体（workflow-service）。默认开（有副作用·人在环，需 workflow-service 可达）；置 false 则 refund_start/workflow_status/workflow_tasks 动作、
    # /agent/process 端点、workflow RestTemplate/客户端都不装配。read-timeout 放宽——refund/start 同步跑两次 LLM。
    workflow:
      enabled: ${AGENT_WORKFLOW_ENABLED:true}
      base-url: ${WORKFLOW_BASE_URL:http://localhost:8082}
      read-timeout: ${AGENT_WORKFLOW_READ_TIMEOUT:60s}
    # 订单查询（order-service）。默认开：order_query 经内部 JWT 直连 order-service 按订单号只读查、按租户隔离；
    # 置 false 则 order_query 走 NoopOrderClient（返回 disabled）、orderRestTemplate 不装配。
    order:
      enabled: ${AGENT_ORDER_ENABLED:true}
      base-url: ${ORDER_BASE_URL:http://localhost:8093}
    http:
      connect-timeout: ${AGENT_HTTP_CONNECT_TIMEOUT:1s}
      read-timeout: ${AGENT_HTTP_READ_TIMEOUT:5s}
    async:
      task-ttl: ${AGENT_TASK_TTL:PT24H}
      cleanup-delay-ms: ${AGENT_TASK_CLEANUP_DELAY_MS:60000}
      cleanup-initial-delay-ms: ${AGENT_TASK_CLEANUP_INITIAL_DELAY_MS:60000}
      external:
        enabled: ${AGENT_ASYNC_EXTERNAL_ENABLED:true}
        base-url: ${ASYNC_TASK_BASE_URL:http://localhost:8086}
        mirror-webhook: ${AGENT_ASYNC_EXTERNAL_MIRROR_WEBHOOK:false}
        authoritative: ${AGENT_ASYNC_EXTERNAL_AUTHORITATIVE:false}
        worker-id: ${AGENT_ASYNC_WORKER_ID:agent-service}
        lease-seconds: ${AGENT_ASYNC_LEASE_SECONDS:300}
      webhook:
        enabled: ${AGENT_TASK_WEBHOOK_ENABLED:true}
        max-attempts: ${AGENT_TASK_WEBHOOK_MAX_ATTEMPTS:3}
        backoff: ${AGENT_TASK_WEBHOOK_BACKOFF:250ms}
        connect-timeout: ${AGENT_TASK_WEBHOOK_CONNECT_TIMEOUT:1s}
        read-timeout: ${AGENT_TASK_WEBHOOK_READ_TIMEOUT:3s}
    dag:
      max-tasks: ${AGENT_DAG_MAX_TASKS:6}
      replan:
        enabled: ${AGENT_DAG_REPLAN_ENABLED:true}
        max-replans: ${AGENT_DAG_REPLAN_MAX_REPLANS:1}
        threshold: ${AGENT_DAG_REPLAN_THRESHOLD:0.75}
        weights:
          correctness: ${AGENT_DAG_REPLAN_WEIGHT_CORRECTNESS:0.5}
          completeness: ${AGENT_DAG_REPLAN_WEIGHT_COMPLETENESS:0.35}
          clarity: ${AGENT_DAG_REPLAN_WEIGHT_CLARITY:0.15}
    # Prompt Chaining（顺序步骤 + 步间确定性 gate + 不过即短路）。POST /agent/chain。
    # steps 默认空 —— 需在此定义预定义链后端点才有内容可跑（否则 400）。
    # 每步：name / instruction（喂给 ChainLink）/ gate-min-length / gate-must-contain / gate-must-match（正则 find）。
    chaining:
      # 默认演示链：翻译→总结（服务端预定义，任意输入都作为该固定管线入参）。
      # gate-min-length 演示步间确定性 gate；对真实模型输出稳定通过、不会误短路。
      steps:
        - name: translate
          instruction: 把输入内容翻译成英文，只输出译文，不要额外解释
          gate-min-length: 10
        - name: summarize
          instruction: 用一句中文概括上一步英文内容的要点
          gate-min-length: 8
    # Voting（同题并行 N 次取共识）。POST /agent/vote。
    # strategy=majority：确定性多数表决，仅适用于离散/分类题（是否合规、情感极性、单选标签等）——
    #   自由文本每次措辞不同、归一化后各自成派，几乎必然不达 min-agreement，应改用 synthesis。
    # strategy=synthesis：聚合器 LLM（temp=0 判官变体）收口，适用于自由文本题。
    voting:
      n: ${AGENT_VOTING_N:3}
      strategy: ${AGENT_VOTING_STRATEGY:majority}
      min-agreement: ${AGENT_VOTING_MIN_AGREEMENT:0.5}
    # Reflexion 自省环（单答案 answer→critique→improve，加权聚合达阈值即停）。POST /agent/reflexive[/stream]。
    # 评分复用 DAG 的 AgentDagCritic；权重与聚合算法与 DAG 共吃 CritiqueAggregation。
    reflexion:
      threshold: ${AGENT_REFLEXION_THRESHOLD:0.75}
      max-attempts: ${AGENT_REFLEXION_MAX_ATTEMPTS:2}
      weights:
        correctness: ${AGENT_REFLEXION_WEIGHT_CORRECTNESS:0.4}
        completeness: ${AGENT_REFLEXION_WEIGHT_COMPLETENESS:0.4}
        clarity: ${AGENT_REFLEXION_WEIGHT_CLARITY:0.2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tokenbudget,cost
  endpoint:
    health:
      probes:
        enabled: true
