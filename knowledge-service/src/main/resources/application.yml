server:
  port: 8084

spring:
  application:
    name: knowledge-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

platform:
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:4000/v1}
    api-key: ${GATEWAY_API_KEY:sk-litellm-master}
  security:
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    allow-api-key-fallback: true
    api-keys:
      dev-key-acme:
        tenant: acme
        user: alice
        scopes: [chat, ingest]

app:
  rag:
    vector-store:
      provider: ${RAG_VECTOR_STORE_PROVIDER:in-memory}
      # collection-per-tenant（默认，强隔离，每租户独立 collection/namespace）| shared（退回单 store + metadata filter）
      isolation: ${RAG_VECTOR_STORE_ISOLATION:collection-per-tenant}
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        collection-name: ${QDRANT_COLLECTION_NAME:knowledge_segments}
        use-tls: ${QDRANT_USE_TLS:false}
        api-key: ${QDRANT_API_KEY:}
        payload-text-key: ${QDRANT_PAYLOAD_TEXT_KEY:text}
        timeout: ${QDRANT_TIMEOUT:10s}
        health-timeout: ${QDRANT_HEALTH_TIMEOUT:3s}
        auto-create-payload-index: ${QDRANT_AUTO_CREATE_PAYLOAD_INDEX:true}
    embedding:
      provider: ${RAG_EMBEDDING_PROVIDER:hash}
      model-name: ${RAG_EMBEDDING_MODEL:embedding-default}
      dimensions: ${RAG_EMBEDDING_DIMENSIONS:0}
      timeout: ${RAG_EMBEDDING_TIMEOUT:60s}
      max-retries: ${RAG_EMBEDDING_MAX_RETRIES:3}
      max-segments-per-batch: ${RAG_EMBEDDING_MAX_SEGMENTS_PER_BATCH:0}
      ollama:
        base-url: ${RAG_EMBEDDING_OLLAMA_BASE_URL:http://localhost:11434}
        model-name: ${RAG_EMBEDDING_OLLAMA_MODEL:nomic-embed-text}
    registry:
      store: ${RAG_REGISTRY_STORE:in-memory}
    image-text:
      provider: ${RAG_IMAGE_TEXT_PROVIDER:none}
      endpoint-url: ${RAG_IMAGE_TEXT_ENDPOINT_URL:http://localhost:8090/image-text}
      connect-timeout: ${RAG_IMAGE_TEXT_CONNECT_TIMEOUT:2s}
      read-timeout: ${RAG_IMAGE_TEXT_READ_TIMEOUT:30s}
      max-image-bytes: ${RAG_IMAGE_TEXT_MAX_IMAGE_BYTES:10485760}
    query:
      top-k: ${RAG_QUERY_TOP_K:5}
      min-score: ${RAG_QUERY_MIN_SCORE:0.0}
    ranking:
      vector-weight: ${RAG_RANKING_VECTOR_WEIGHT:1.0}
      keyword-weight: ${RAG_RANKING_KEYWORD_WEIGHT:1.0}
      graph-weight: ${RAG_RANKING_GRAPH_WEIGHT:1.0}
    hybrid:
      enabled: ${RAG_HYBRID_ENABLED:true}
      keyword-top-k: ${RAG_HYBRID_KEYWORD_TOP_K:${RAG_QUERY_TOP_K:5}}
    graph:
      enabled: ${RAG_GRAPH_ENABLED:false}
      store: ${RAG_GRAPH_STORE:in-memory}
      include-in-query: ${RAG_GRAPH_INCLUDE_IN_QUERY:${RAG_GRAPH_ENABLED:false}}
      query-top-k: ${RAG_GRAPH_QUERY_TOP_K:${RAG_GRAPH_MAX_TRIPLES:20}}
      max-hops: ${RAG_GRAPH_MAX_HOPS:2}
      max-triples: ${RAG_GRAPH_MAX_TRIPLES:20}
      max-triples-per-chunk: ${RAG_GRAPH_MAX_TRIPLES_PER_CHUNK:12}
      relation-whitelist: ${RAG_GRAPH_RELATION_WHITELIST:}
      aliases: ${RAG_GRAPH_ALIASES:}
      async: ${RAG_GRAPH_ASYNC:false}
      datasource:
        url: ${RAG_GRAPH_DB_URL:jdbc:mysql://localhost:3306/knowledge_graph?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true}
        username: ${RAG_GRAPH_DB_USER:root}
        password: ${RAG_GRAPH_DB_PASSWORD:}
        driver-class-name: ${RAG_GRAPH_DB_DRIVER:com.mysql.cj.jdbc.Driver}
        maximum-pool-size: ${RAG_GRAPH_DB_MAX_POOL_SIZE:8}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
