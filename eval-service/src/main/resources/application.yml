server:
  port: 8089

spring:
  application:
    name: eval-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

app:
  eval:
    default-target-base-url: ${EVAL_TARGET_BASE_URL:http://edge-gateway:8080}
    api-key: ${EVAL_API_KEY:}
    api-key-header: ${EVAL_API_KEY_HEADER:X-API-Key}
    response-snippet-limit: ${EVAL_RESPONSE_SNIPPET_LIMIT:512}
    baseline-directory: ${EVAL_BASELINE_DIRECTORY:}
    report-directory: ${EVAL_REPORT_DIRECTORY:}
    snapshot-directory: ${EVAL_SNAPSHOT_DIRECTORY:}
    judge-min-score: ${EVAL_JUDGE_MIN_SCORE:0.7}
    embedding-min-score: ${EVAL_EMBEDDING_MIN_SCORE:0.75}
    # 双跑门禁容差（candidate 相对 oracle 允许的下滑）+ 一致性阈值 + 每 case 重复次数。
    gate-pass-rate-tolerance: ${EVAL_GATE_PASS_RATE_TOLERANCE:0.05}
    gate-average-score-tolerance: ${EVAL_GATE_AVERAGE_SCORE_TOLERANCE:0.05}
    gate-min-agreement: ${EVAL_GATE_MIN_AGREEMENT:0.6}
    gate-runs: ${EVAL_GATE_RUNS:1}
    judge:
      enabled: ${EVAL_JUDGE_ENABLED:true}
    embedding:
      enabled: ${EVAL_EMBEDDING_ENABLED:true}
      model-name: ${EVAL_EMBEDDING_MODEL:embedding-default}

platform:
  security:
    jwt-secret: ${INTERNAL_JWT_SECRET:dev-only-internal-secret-change-me-please-32b}
    service-token-allowed-origins: ${INTERNAL_SERVICE_TOKEN_ALLOWED_ORIGINS:http://edge-gateway:8080}
    allow-api-key-fallback: ${INTERNAL_API_KEY_FALLBACK:false}
    authentication-required: ${INTERNAL_AUTH_REQUIRED:true}
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:4000/v1}
    api-key: ${GATEWAY_API_KEY:sk-litellm-master}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
