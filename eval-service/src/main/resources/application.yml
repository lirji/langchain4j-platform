server:
  port: 8089

spring:
  application:
    name: eval-service
  # 集中配置（可选）：Config Server 不可达时不阻断启动，各 ${ENV:default} 兜底继续生效。
  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

app:
  eval:
    default-target-base-url: ${EVAL_TARGET_BASE_URL:http://edge-gateway:8080}
    api-key: ${EVAL_API_KEY:}
    api-key-header: ${EVAL_API_KEY_HEADER:X-API-Key}
    response-snippet-limit: ${EVAL_RESPONSE_SNIPPET_LIMIT:512}
    baseline-directory: ${EVAL_BASELINE_DIRECTORY:}
    report-directory: ${EVAL_REPORT_DIRECTORY:}
    judge-min-score: ${EVAL_JUDGE_MIN_SCORE:0.7}
    embedding-min-score: ${EVAL_EMBEDDING_MIN_SCORE:0.75}
    judge:
      enabled: ${EVAL_JUDGE_ENABLED:false}
    embedding:
      enabled: ${EVAL_EMBEDDING_ENABLED:false}
      model-name: ${EVAL_EMBEDDING_MODEL:embedding-default}

platform:
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:4000/v1}
    api-key: ${GATEWAY_API_KEY:sk-litellm-master}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
