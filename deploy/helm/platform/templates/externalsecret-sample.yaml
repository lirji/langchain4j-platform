{{/*
External Secrets Operator (ESO) 样例：从 Vault 同步出与本 chart 同名的 Secret。
默认关闭（externalSecrets.enabled=false，占位 Secret 生效）。生产：
  1. 部署 ESO + 配置 SecretStore/ClusterSecretStore 指向 Vault；
  2. 设 secrets.create=false（关掉占位 Secret）；
  3. 设 externalSecrets.enabled=true 让 ESO 拉取真值填充同名 Secret。
需要 CRD external-secrets.io/v1；此文件仅在开关打开时渲染，lint 不依赖 CRD 存在。
*/}}
{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: platform-secrets
  labels:
    app.kubernetes.io/part-of: langchain4j-platform
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: platform-secrets
    creationPolicy: Owner
  data:
    - secretKey: PLATFORM_SECURITY_JWT_PUBLIC_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/internal-jwt
        property: public-key
    - secretKey: INTERNAL_JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/internal-jwt
        property: hs256-secret
    - secretKey: GATEWAY_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/litellm
        property: master-key
    - secretKey: WORKFLOW_DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/db
        property: workflow-password
    - secretKey: NL2SQL_DB_ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/db
        property: nl2sql-password
    - secretKey: ASYNC_TASK_DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/db
        property: async-task-password
    - secretKey: RAG_GRAPH_DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/db
        property: rag-graph-password
    - secretKey: AUTH_DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/db
        property: auth-password
    - secretKey: WORKFLOW_OUTBOX_HMAC_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/workflow
        property: outbox-hmac
    - secretKey: EVAL_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/eval
        property: api-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: edge-gateway-jwt
  labels:
    app.kubernetes.io/part-of: langchain4j-platform
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: edge-gateway-jwt
    creationPolicy: Owner
  data:
    - secretKey: PLATFORM_SECURITY_JWT_PRIVATE_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/internal-jwt
        property: private-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-session-jwt
  labels:
    app.kubernetes.io/part-of: langchain4j-platform
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: auth-session-jwt
    creationPolicy: Owner
  data:
    - secretKey: SESSION_JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}/session-jwt
        property: hs256-secret
{{- end }}
