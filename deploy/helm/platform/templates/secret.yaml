{{/*
敏感项 → Secret（占位值）。
生产：secrets.create=false，改由 External Secrets Operator 从 Vault/云 KMS 同步出
同名 Secret（platform-secrets / edge-gateway-jwt / edge-gateway-apikeys），见 externalsecret-sample.yaml。

RS256 密钥拆分（缩小轮转爆炸半径）：
  - platform-secrets 含公钥 → envFrom 注入所有服务（下游只验签）
  - edge-gateway-jwt 含私钥 → 仅 edge-gateway envFrom（唯一签发者）
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  labels:
    app.kubernetes.io/name: platform-secrets
    app.kubernetes.io/part-of: langchain4j-platform
  annotations:
    # 生产替换：kubectl 不该管理明文密钥，改用 ExternalSecret（Vault backend）。
    platform.lrj.com/secret-source: "placeholder — replace via External Secrets Operator / Vault"
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.shared }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: edge-gateway-jwt
  labels:
    app.kubernetes.io/name: edge-gateway-jwt
    app.kubernetes.io/part-of: langchain4j-platform
  annotations:
    platform.lrj.com/secret-source: "placeholder — RS256 私钥，仅 edge-gateway 挂载"
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.gatewayJwt }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: edge-gateway-apikeys
  labels:
    app.kubernetes.io/name: edge-gateway-apikeys
    app.kubernetes.io/part-of: langchain4j-platform
  annotations:
    platform.lrj.com/secret-source: "placeholder — api-key→租户 目录，卷挂载 + SPRING_CONFIG_IMPORT 导入"
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.gatewayApiKeys }}
  {{ $k }}: |
{{ $v | indent 4 }}
  {{- end }}
{{- end }}
