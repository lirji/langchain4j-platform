# 本地整网：LiteLLM(AI 网关) + Redis + MySQL + Kafka + Qdrant + Elasticsearch/Kibana + 各服务。
# 用法见 deploy/README.md。基础设施(litellm/redis/mysql/kafka/qdrant/elasticsearch/kibana)先起，应用服务需先 `mvn -DskipTests package`。
# 注意：knowledge-service 默认走 nomic 语义 embedding（宿主机 Ollama）+ ES 全文混排(RRF)，
#       前置 `ollama pull nomic-embed-text`；要零依赖可设 RAG_EMBEDDING_PROVIDER=hash / RAG_ES_ENABLED=false。
name: langchain4j-platform

services:
  litellm:
    # 固定 tag（不再用浮动 main-stable）：spend 记账/virtual key/UI 依赖其自带 Prisma schema，
    # 浮动镜像升级可能带不兼容 migration。升级流程：先备份 litellm-postgres 卷再换 tag。
    image: ghcr.io/berriai/litellm:${LITELLM_IMAGE_TAG:-v1.74.3-stable}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      # chat-default 主目标 = DeepSeek（云端，OpenAI 兼容）。key 取自宿主环境变量，不落盘。
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # ── spend 记账 / virtual key / 管理 UI（http://localhost:4000/ui，master key 或下面 UI 账号登录）──
      # LiteLLM 只支持 Postgres（独立于业务 MySQL）；DATABASE_URL 存在即自动跑 Prisma migration。
      DATABASE_URL: postgresql://litellm:${LITELLM_PG_PASSWORD:-litellm-dev-pw}@litellm-postgres:5432/litellm
      STORE_MODEL_IN_DB: "false"   # 模型路由仍以 config.yaml 为准（配置即代码），UI 里只读不改
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-litellm-ui-dev}
      # ── 响应缓存（复用栈内 Redis；cache 细节在 config.yaml litellm_settings.cache_params）──
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # ── LiteLLM 自身 OTel span → Jaeger（与 Java 服务同 collector，跨 Java/LiteLLM 同 trace 关联）──
      # 注意：otlp_http 必须带完整 /v1/traces 路径，只给到 :4318 会 404（真机验证过的坑）
      OTEL_EXPORTER: otlp_http
      OTEL_ENDPOINT: http://jaeger:4318/v1/traces
      OTEL_SERVICE_NAME: litellm-proxy
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 让容器内 LiteLLM 能回连宿主机 Ollama
    depends_on:
      litellm-postgres:
        condition: service_healthy   # 等 PG 就绪再起，避免 Prisma migration 撞未就绪库
      redis:
        condition: service_started

  # LiteLLM 专用 Postgres（spend/virtual key/team 状态）。独立实例：业务侧是 MySQL，且不让
  # 第三方 Prisma schema 与业务库同生命周期。刻意不映射宿主端口（authz-postgres 等易撞 5432）。
  litellm-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_PG_PASSWORD:-litellm-dev-pw}
    volumes:
      - litellm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 12

  # 追踪 collector + UI（http://localhost:16686）。版本与 docs/平台工程/observability-guide.md 一致。
  # Java 侧追踪默认关（MANAGEMENT_TRACING_ENABLED=false 兜底）；开启后与 LiteLLM span 同 trace。
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_PORT:-4318}:4318"

  redis:
    image: redis:7-alpine
    # appendonly 持久化 + 命名卷：限流/令牌预算/成本/语义缓存/文档注册表等跨重启存活
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: platform
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  # Elasticsearch（默认开启，ES 全文混排 + RRF）。自建镜像装 analysis-smartcn 中文分析器。
  # knowledge-service 用自建 EsGateway，故其 application.yml 已排除 Spring 的 ES 自动配置/健康指示器。
  elasticsearch:
    build: ./es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  # Kibana：浏览/查询 ES 数据的官方 Web UI（http://localhost:5601 → Dev Tools 跑 DSL）。
  # 较重(~1G+ RAM)；不需要可 `docker compose stop kibana`（不影响 ES 混排）。
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_PUBLICBASEURL: http://localhost:5601
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # 集中配置分发（可选）。默认 native 后端（读打包进 jar 的 config/ 目录），无需 git。
  # 刻意不作为其它服务的 depends_on 阻塞条件：各服务用 optional import，server 不在也照常启动。
  config-server:
    build:
      context: ../config-server
    environment:
      CONFIG_SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: ${CONFIG_SERVER_PROFILE:-native}
      # 切 git 后端：CONFIG_SERVER_PROFILE=git + SPRING_CLOUD_CONFIG_SERVER_GIT_URI=...
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: ${SPRING_CLOUD_CONFIG_SERVER_GIT_URI:-}
    ports:
      - "8888:8888"

  conversation-service:
    build:
      context: ../conversation-service
    environment:
      GATEWAY_BASE_URL: http://litellm:4000/v1
      GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      GATEWAY_MODEL: chat-default
      # LiteLLM 租户归因：none(默认,行为与历史一致) / user(spend 按 end-user=租户归集) / virtual-key(per-tenant key,预算/限流硬保底)。
      # virtual-key 档另需 PLATFORM_GATEWAY_TENANT_VIRTUAL_KEYS_<TENANT>=sk-...（Secret 注入，不进 compose/git）。
      PLATFORM_GATEWAY_TENANT_ATTRIBUTION: ${PLATFORM_GATEWAY_TENANT_ATTRIBUTION:-none}
      # 分布式追踪默认关；置 true 后 LLM 出站带 traceparent，与 LiteLLM span 同 trace（Jaeger :16686）
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-false}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      CONVERSATION_RAG_ENABLED: ${CONVERSATION_RAG_ENABLED:-true}
      KNOWLEDGE_BASE_URL: http://knowledge-service:8084
      CONVERSATION_RAG_TOP_K: ${CONVERSATION_RAG_TOP_K:-5}
      CONVERSATION_RAG_CATEGORY: ${CONVERSATION_RAG_CATEGORY:-}
      # ── 能力展示：纯靠 DeepSeek 栈即可跑通的对话高级能力，默认打开（前端 catalog 对应 state=ready）──
      CONVERSATION_ROUTER_ENABLED: ${CONVERSATION_ROUTER_ENABLED:-true}          # /chat/auto 意图路由
      CHAT_CASCADE_ENABLED: ${CHAT_CASCADE_ENABLED:-true}                        # /chat/cascade 级联降级（cheap/strong 留空退化默认模型）
      CONVERSATION_MEMORY_PROFILE_ENABLED: ${CONVERSATION_MEMORY_PROFILE_ENABLED:-true}  # /chat/memory + GET/DELETE /memory/profile 长期画像
      # chat.vision：依赖 vision-service 启用且配了可路由的视觉模型（见下方 vision-service）；否则 /chat/vision 上游不可用
      CONVERSATION_VISION_ENABLED: ${CONVERSATION_VISION_ENABLED:-true}
      CONVERSATION_VISION_BASE_URL: http://vision-service:8090
      # chat.mcp：需一个可达的 MCP server。开启但无 server 会在启动握手时失败拖垮本服务，故默认关。
      # 启用：置 true 并把 URL 指向真实 MCP（streamable-http），如 http://host.docker.internal:3001/mcp
      CONVERSATION_MCP_ENABLED: ${CONVERSATION_MCP_ENABLED:-false}
      CONVERSATION_MCP_TRANSPORT: ${CONVERSATION_MCP_TRANSPORT:-http}
      CONVERSATION_MCP_HTTP_URL: ${CONVERSATION_MCP_HTTP_URL:-http://host.docker.internal:3001/mcp}
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - litellm
      - knowledge-service
    ports:
      - "8081:8081"

  workflow-service:
    build:
      context: ../workflow-service
    environment:
      WORKFLOW_ENABLED: "true"
      WORKFLOW_DB_URL: jdbc:mysql://mysql:3306/flowable?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      WORKFLOW_DB_USER: root
      WORKFLOW_DB_PASSWORD: root
      GATEWAY_BASE_URL: http://litellm:4000/v1
      GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      GATEWAY_MODEL: chat-default
      PLATFORM_GATEWAY_TENANT_ATTRIBUTION: ${PLATFORM_GATEWAY_TENANT_ATTRIBUTION:-none}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-false}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      WORKFLOW_OUTBOX_HMAC_SECRET: ${WORKFLOW_OUTBOX_HMAC_SECRET:-dev-secret-change-me}
      WORKFLOW_TERMINAL_NOTIFICATION_MODE: async-task
      ASYNC_TASK_BASE_URL: http://async-task-service:8086
    depends_on:
      - mysql
      - litellm
      - async-task-service
    ports:
      - "8082:8082"

  analytics-service:
    build:
      context: ../analytics-service
    environment:
      NL2SQL_ENABLED: "true"
      NL2SQL_DB_URL: jdbc:mysql://mysql:3306/nl2sql_demo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useInformationSchema=true
      NL2SQL_DB_READONLY_URL: jdbc:mysql://mysql:3306/nl2sql_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useInformationSchema=true
      NL2SQL_DB_ADMIN_USER: root
      NL2SQL_DB_ADMIN_PASSWORD: root
      GATEWAY_BASE_URL: http://litellm:4000/v1
      GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      GATEWAY_MODEL: chat-default
      PLATFORM_GATEWAY_TENANT_ATTRIBUTION: ${PLATFORM_GATEWAY_TENANT_ATTRIBUTION:-none}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-false}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - mysql
      - litellm
    ports:
      - "8083:8083"

  knowledge-service:
    build:
      context: ../knowledge-service
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 容器内回连宿主机 Ollama（nomic embedding）
    environment:
      GATEWAY_BASE_URL: http://litellm:4000/v1
      GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      PLATFORM_GATEWAY_TENANT_ATTRIBUTION: ${PLATFORM_GATEWAY_TENANT_ATTRIBUTION:-none}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-false}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      # 语义 embedding 默认走宿主机 Ollama 的 nomic-embed-text（768 维）。
      # 前置：宿主机已 `ollama pull nomic-embed-text`。要零依赖 hash（无语义）：设 RAG_EMBEDDING_PROVIDER=hash。
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-ollama}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-nomic-embed-text}
      RAG_EMBEDDING_OLLAMA_BASE_URL: ${RAG_EMBEDDING_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # nomic 非对称任务前缀（尾部空格必须保留）：对齐 query/document 向量空间，提升检索准确率
      RAG_EMBEDDING_QUERY_PREFIX: "search_query: "
      RAG_EMBEDDING_DOCUMENT_PREFIX: "search_document: "
      RAG_VECTOR_STORE_PROVIDER: ${RAG_VECTOR_STORE_PROVIDER:-qdrant}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_COLLECTION_NAME: knowledge_segments
      RAG_REGISTRY_STORE: ${RAG_REGISTRY_STORE:-redis}
      # 公共/共享知识库（默认关闭）：开启后查询在隔离查各自租户基础上并入 __public__ 公共分区。
      RAG_PUBLIC_ENABLED: ${RAG_PUBLIC_ENABLED:-false}
      # ── 细粒度授权（接 auth-platform / SpiceDB ReBAC）。默认 disabled（与接入前逐字一致）──
      # disabled | shadow（照写关系、读双算记差异但不拦截，灰度观测）| enforce（读按 ReBAC 真过滤）。
      # 灰度顺序：disabled → shadow（观测 knowledge.authz.* 指标）→ 单租户 enforce → 扩大。切回 shadow 即回滚。
      RAG_AUTHZ_MODE: ${RAG_AUTHZ_MODE:-disabled}
      # auth-platform-server(:8200)。该服务不在本 compose（在 auth-platform 仓库自带 deploy），故走宿主机地址。
      AUTHZ_SERVER_URL: ${AUTHZ_SERVER_URL:-http://host.docker.internal:8200}
      # service credential：须与 auth-platform-server 的 authz.server.security.token 一致；server 未开鉴权时留空。
      AUTHZ_SERVER_TOKEN: ${AUTHZ_SERVER_TOKEN:-}
      # 候选/批次安全上限（非法值启动失败）。默认值见 application.yml，可按压测调整。
      RAG_AUTHZ_CANDIDATE_MULTIPLIER: ${RAG_AUTHZ_CANDIDATE_MULTIPLIER:-3}
      RAG_AUTHZ_MAX_CANDIDATES: ${RAG_AUTHZ_MAX_CANDIDATES:-200}
      RAG_AUTHZ_BULK_SIZE: ${RAG_AUTHZ_BULK_SIZE:-100}
      RAG_HYBRID_ENABLED: ${RAG_HYBRID_ENABLED:-true}
      # 混合检索关键词半边用 HanLP 中文分词（默认 simple=bigram），仅影响 keyword/graph 分支，不碰向量。
      RAG_HYBRID_TOKENIZER: ${RAG_HYBRID_TOKENIZER:-hanlp}
      # ── ES 全文混排（默认开启）：BM25 关键词分支并入混合检索，多源 RRF 融合 ──
      RAG_ES_ENABLED: ${RAG_ES_ENABLED:-true}
      RAG_ES_URIS: ${RAG_ES_URIS:-http://elasticsearch:9200}
      RAG_ES_ANALYZER: ${RAG_ES_ANALYZER:-smartcn}      # 中文分析器（镜像已装 analysis-smartcn）
      RAG_FUSION_STRATEGY: ${RAG_FUSION_STRATEGY:-rrf}   # 免疫 BM25/余弦量纲差；留空亦会因 ES 开启取有效默认 rrf
      RAG_RANKING_VECTOR_WEIGHT: ${RAG_RANKING_VECTOR_WEIGHT:-1.0}
      RAG_RANKING_KEYWORD_WEIGHT: ${RAG_RANKING_KEYWORD_WEIGHT:-1.0}
      RAG_RANKING_GRAPH_WEIGHT: ${RAG_RANKING_GRAPH_WEIGHT:-1.0}
      # ── 检索质量：相关性下限 + 重排（避免无阈值 top-k 凑数返回不相关文档，如零售查询命中 SSO 手册）──
      # min-score 只作用于向量源，比较 langchain4j 归一化相关度 [0,1]（cosine ≈ (cos+1)/2，不相关≈0.5）。
      # 0.6 为起点：先跑一次看真实命中分数（响应/日志），把 floor 卡在“真相关分”与“凑数分”之间；过高会返回空。
      RAG_QUERY_MIN_SCORE: ${RAG_QUERY_MIN_SCORE:-0.6}
      # 重排（默认关）：type=llm 复用共享 temp=0 网关模型给候选打分重排，精排掉残余 filler（覆盖全部通道，不止向量）。
      # 需 LiteLLM 可达；每次查询多一次 LLM 调用（延迟/成本↑，候选池 = top-k × RAG_RERANK_CANDIDATE_MULTIPLIER）。
      RAG_RERANK_ENABLED: ${RAG_RERANK_ENABLED:-true}
      # 重排相关性阈值(0..1)：低于此分的候选丢弃 → topK 成为"上限"，不再凑数返回不相关文档（方案③）。
      # 0.5 为起点：先看日志/响应里的真实 rerank 分，把它卡在“真相关分”与“凑数分”之间；过高会返回空。
      RAG_RERANK_MIN_SCORE: ${RAG_RERANK_MIN_SCORE:-0.5}
      RAG_GRAPH_ENABLED: ${RAG_GRAPH_ENABLED:-true}
      RAG_GRAPH_STORE: ${RAG_GRAPH_STORE:-jdbc}
      RAG_GRAPH_INCLUDE_IN_QUERY: ${RAG_GRAPH_INCLUDE_IN_QUERY:-${RAG_GRAPH_ENABLED:-true}}
      RAG_GRAPH_QUERY_TOP_K: ${RAG_GRAPH_QUERY_TOP_K:-20}
      RAG_GRAPH_RELATION_WHITELIST: ${RAG_GRAPH_RELATION_WHITELIST:-}
      RAG_GRAPH_ALIASES: ${RAG_GRAPH_ALIASES:-}
      RAG_GRAPH_DB_URL: jdbc:mysql://mysql:3306/knowledge_graph?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
      RAG_GRAPH_DB_USER: root
      RAG_GRAPH_DB_PASSWORD: root
      # 图片 RAG（/rag/image、/rag/image-search）：装配 boot-safe，默认打开以在前端放行表单。
      # 注意：实际图片向量化走 OpenAI 兼容的多模态 embedding 端点（RAG_MULTIMODAL_BASE_URL/MODEL），
      # 未配真实端点时上传/检索会在调用期报错——能力已注册（前端 catalog=ready），functional 需自备端点。
      RAG_MULTIMODAL_ENABLED: ${RAG_MULTIMODAL_ENABLED:-true}
      # 指向栈内 redis 容器：registry/semantic-cache/rate-limit/token-budget/cost 默认已持久化到 redis
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      elasticsearch:
        condition: service_healthy   # 等 ES 就绪再起，避免首次入库 index create 撞 ES 未起
    ports:
      - "8084:8084"

  agent-service:
    build:
      context: ../agent-service
    environment:
      GATEWAY_BASE_URL: http://litellm:4000/v1
      GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      GATEWAY_MODEL: chat-default
      PLATFORM_GATEWAY_TENANT_ATTRIBUTION: ${PLATFORM_GATEWAY_TENANT_ATTRIBUTION:-none}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-false}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      KNOWLEDGE_BASE_URL: http://knowledge-service:8084
      ANALYTICS_BASE_URL: http://analytics-service:8083
      AGENT_ENABLED: ${AGENT_ENABLED:-true}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-8}
      AGENT_RAG_TOP_K: ${AGENT_RAG_TOP_K:-5}
      AGENT_RAG_CATEGORY: ${AGENT_RAG_CATEGORY:-}
      AGENT_ANALYTICS_ENABLED: ${AGENT_ANALYTICS_ENABLED:-true}
      # /agent/process 业务流程智能体（人在环）→ workflow-service（已在栈内），默认打开
      AGENT_WORKFLOW_ENABLED: ${AGENT_WORKFLOW_ENABLED:-true}
      WORKFLOW_BASE_URL: http://workflow-service:8082
      # order_query 动作 → order-service（已在栈内，演示种子订单 101-109），栈内默认打开
      AGENT_ORDER_ENABLED: ${AGENT_ORDER_ENABLED:-true}
      ORDER_BASE_URL: http://order-service:8093
      AGENT_CODE_EXEC_ENABLED: ${AGENT_CODE_EXEC_ENABLED:-false}
      AGENT_BROWSER_ENABLED: ${AGENT_BROWSER_ENABLED:-false}
      AGENT_MCP_ENABLED: ${AGENT_MCP_ENABLED:-false}
      AGENT_MCP_TRANSPORT: ${AGENT_MCP_TRANSPORT:-http}
      AGENT_MCP_HTTP_URL: ${AGENT_MCP_HTTP_URL:-http://host.docker.internal:3001/mcp}
      AGENT_VISION_ENABLED: ${AGENT_VISION_ENABLED:-false}
      VISION_BASE_URL: http://vision-service:8090
      AGENT_TASK_WEBHOOK_ENABLED: ${AGENT_TASK_WEBHOOK_ENABLED:-true}
      AGENT_TASK_WEBHOOK_MAX_ATTEMPTS: ${AGENT_TASK_WEBHOOK_MAX_ATTEMPTS:-3}
      AGENT_TASK_WEBHOOK_BACKOFF: ${AGENT_TASK_WEBHOOK_BACKOFF:-250ms}
      AGENT_ASYNC_EXTERNAL_ENABLED: ${AGENT_ASYNC_EXTERNAL_ENABLED:-false}
      AGENT_ASYNC_EXTERNAL_AUTHORITATIVE: ${AGENT_ASYNC_EXTERNAL_AUTHORITATIVE:-false}
      AGENT_ASYNC_EXTERNAL_MIRROR_WEBHOOK: ${AGENT_ASYNC_EXTERNAL_MIRROR_WEBHOOK:-false}
      AGENT_ASYNC_WORKER_ID: ${AGENT_ASYNC_WORKER_ID:-agent-service}
      AGENT_ASYNC_LEASE_SECONDS: ${AGENT_ASYNC_LEASE_SECONDS:-300}
      ASYNC_TASK_BASE_URL: http://async-task-service:8086
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - litellm
      - knowledge-service
      - analytics-service
      - async-task-service
      - workflow-service
    ports:
      - "8085:8085"

  async-task-service:
    build:
      context: ../async-task-service
    environment:
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      ASYNC_TASK_STORE: ${ASYNC_TASK_STORE:-jdbc}
      ASYNC_TASK_DB_URL: jdbc:mysql://mysql:3306/async_task?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
      ASYNC_TASK_DB_USER: root
      ASYNC_TASK_DB_PASSWORD: root
      ASYNC_TASK_WEBHOOK_ENABLED: ${ASYNC_TASK_WEBHOOK_ENABLED:-true}
      ASYNC_TASK_WEBHOOK_MAX_ATTEMPTS: ${ASYNC_TASK_WEBHOOK_MAX_ATTEMPTS:-3}
      ASYNC_TASK_WEBHOOK_BACKOFF: ${ASYNC_TASK_WEBHOOK_BACKOFF:-250ms}
      ASYNC_TASK_WEBHOOK_DELIVERED_RETENTION: ${ASYNC_TASK_WEBHOOK_DELIVERED_RETENTION:-P7D}
    depends_on:
      - mysql
    ports:
      - "8086:8086"

  auth-service:
    build:
      context: ../auth-service
    environment:
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:-dev-only-session-secret-change-me-please-32b}
      AUTH_STORE: ${AUTH_STORE:-jdbc}
      AUTH_DB_URL: jdbc:mysql://mysql:3306/auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
      AUTH_DB_USER: root
      AUTH_DB_PASSWORD: root
      AUTH_DEMO_PASSWORD: ${AUTH_DEMO_PASSWORD:-demo12345}
      # RBAC（demo 直接开：登录展开角色 scopes、管理写开放）。alice 挂 admin 角色 → 含 role-admin。
      # 生产应默认 false 分阶段灰度，并显式配置真实 bootstrap-admin 名单。
      AUTH_RBAC_ENABLED: ${AUTH_RBAC_ENABLED:-true}
      AUTH_RBAC_ADMIN_WRITES_ENABLED: ${AUTH_RBAC_ADMIN_WRITES_ENABLED:-true}
      # 继承式 RBAC（租户基础角色 + 用户组）折进登录 JWT。无绑定时为 no-op，demo 直接开；置 false 即退两级。
      AUTH_RBAC_INHERITANCE_ENABLED: ${AUTH_RBAC_INHERITANCE_ENABLED:-true}
      AUTH_RBAC_BOOTSTRAP_ADMIN_USERS: ${AUTH_RBAC_BOOTSTRAP_ADMIN_USERS:-alice}
      AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-false}
      # 跨域直调网关时刷新 cookie 需 SameSite=None + Secure(HTTPS)；同源代理/同网可用 Lax。
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    depends_on:
      - mysql
    ports:
      - "8092:8092"

  channel-service:
    build:
      context: ../channel-service
    environment:
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      CHANNEL_OUTBOUND_ENABLED: ${CHANNEL_OUTBOUND_ENABLED:-false}
      CHANNEL_OUTBOUND_SIGNATURE_ENABLED: ${CHANNEL_OUTBOUND_SIGNATURE_ENABLED:-false}
      CHANNEL_OUTBOUND_SIGNATURE_SECRET: ${CHANNEL_OUTBOUND_SIGNATURE_SECRET:-}
      CHANNEL_EVENTS_ENABLED: ${CHANNEL_EVENTS_ENABLED:-false}
      CHANNEL_EVENTS_TOPIC: ${CHANNEL_EVENTS_TOPIC:-platform.channel.events}
      CHANNEL_VOICE_PROVIDER_URL: ${CHANNEL_VOICE_PROVIDER_URL:-}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
    ports:
      - "8087:8087"

  interop-service:
    build:
      context: ../interop-service
    environment:
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      AGENT_BASE_URL: http://agent-service:8085
      CONVERSATION_BASE_URL: http://conversation-service:8081
      # A2A push 中继回调回到自身（容器内服务名）；agent 任务终态 webhook 打到这里再转发 A2A 客户端
      INTEROP_A2A_PUSH_CALLBACK_BASE_URL: http://interop-service:8088
    depends_on:
      - agent-service
    ports:
      - "8088:8088"

  eval-service:
    build:
      context: ../eval-service
    environment:
      EVAL_TARGET_BASE_URL: http://edge-gateway:8080
      EVAL_API_KEY: dev-key-acme
    depends_on:
      - edge-gateway
    ports:
      - "8089:8089"

  vision-service:
    build:
      context: ../vision-service
    environment:
      GATEWAY_BASE_URL: http://litellm:4000/v1
      GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master}
      PLATFORM_GATEWAY_TENANT_ATTRIBUTION: ${PLATFORM_GATEWAY_TENANT_ATTRIBUTION:-none}
      MANAGEMENT_TRACING_ENABLED: ${MANAGEMENT_TRACING_ENABLED:-false}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
      # 图像描述（/vision/**）：已默认开。VISION_MODEL 指向 litellm/config.yaml 里的多模态逻辑名 vision-default
      # （→ 本机 Ollama 的 qwen2.5vl）。只置 enabled 而 VISION_MODEL 留空会 fail-fast 崩溃本服务，故二者需同时给到。
      # chat.vision 也依赖此项。前置：本机 `ollama pull qwen2.5vl` 且 Ollama 在 :11434 运行（否则仅调用时报错，不影响启动）。
      VISION_ENABLED: ${VISION_ENABLED:-true}
      VISION_MODEL: ${VISION_MODEL:-vision-default}
      VISION_MAX_IMAGE_BYTES: ${VISION_MAX_IMAGE_BYTES:-10485760}
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - litellm
    ports:
      - "${VISION_HOST_PORT:-8090}:8090"

  voice-service:
    build:
      context: ../voice-service
    environment:
      # 语音闭环（/voice/**）：装配 boot-safe（无 key 仅告警不崩），默认打开以在前端放行表单。
      # 注意：ASR/TTS 实际走 VOICE_BASE_URL（默认云端 OpenAI），无 VOICE_API_KEY 时调用期 401——
      # 能力已注册（前端 catalog=ready），functional 需自备 OpenAI 兼容 Key 或本地 whisper/tts 网关。
      VOICE_ENABLED: ${VOICE_ENABLED:-true}
      VOICE_PROVIDER: ${VOICE_PROVIDER:-openai}
      VOICE_BASE_URL: ${VOICE_BASE_URL:-https://api.openai.com/v1}
      VOICE_API_KEY: ${VOICE_API_KEY:-${OPENAI_API_KEY:-}}
      VOICE_ASR_MODEL: ${VOICE_ASR_MODEL:-whisper-1}
      VOICE_TTS_MODEL: ${VOICE_TTS_MODEL:-tts-1}
      VOICE_TTS_VOICE: ${VOICE_TTS_VOICE:-alloy}
      VOICE_TTS_FORMAT: ${VOICE_TTS_FORMAT:-mp3}
      VOICE_CONVERSATION_BASE_URL: http://conversation-service:8081
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
    depends_on:
      - conversation-service
    ports:
      - "8091:8091"

  # 前后端分离：能力展示前端为独立静态站点（Vite 构建 → nginx），不属于后端 Maven 构建。
  # 浏览器带 X-Api-Key / 登录会话跨域直调 edge-gateway；VITE_* 在构建期烘焙。
  capability-showcase-frontend:
    build:
      context: ../capability-showcase-frontend
      args:
        VITE_EDGE_BASE_URL: ${SHOWCASE_EDGE_BASE_URL:-http://localhost:8080}
        # VITE_AUTH_BASE_URL 留空：/auth/* 走 nginx 同源反代到网关（第一方 httpOnly cookie，SameSite=Lax，无需跨域）。
        # 共享库 UI kill switch（默认开；真正可用仍受运行时 /rag/config 约束）。
        VITE_SHARED_KB_UI_ENABLED: ${SHOWCASE_SHARED_KB_UI_ENABLED:-true}
        # demo 一键登录：本地演示可开并注入口令；生产置 false / 留空口令，产物即不含明文口令。
        VITE_DEMO_LOGIN_ENABLED: ${SHOWCASE_DEMO_LOGIN_ENABLED:-true}
        VITE_DEMO_PASSWORD: ${SHOWCASE_DEMO_PASSWORD:-demo12345}
        # ③ 阶段④ Casdoor OIDC（构建期烘焙、可秒回滚）：默认 apikey（引入即安全，走现状 X-Api-Key/会话 Bearer）。
        # 切 oidc/dual 前须先开后端 EDGE_CASDOOR_ENABLED=true（DR-11 顺序约束），否则 Casdoor Bearer 落到会话 filter 全 401。
        VITE_AUTH_MODE: ${SHOWCASE_AUTH_MODE:-oidc}
        VITE_CASDOOR_ISSUER: ${SHOWCASE_CASDOOR_ISSUER:-http://localhost:8000}
        # client_id 必须 = edge.casdoor.audiences（否则 aud 校验 401）。
        VITE_CASDOOR_CLIENT_ID: ${SHOWCASE_CASDOOR_CLIENT_ID:-ragshared0client00000001}
        VITE_CASDOOR_SCOPES: ${SHOWCASE_CASDOOR_SCOPES:-openid profile email offline_access}
        # 回调/登出/静默续期 SPA 路径（须与 Casdoor app redirectUris 精确登记；silent 刻意无扩展名以走 SPA fallback）。
        VITE_CASDOOR_REDIRECT_PATH: ${SHOWCASE_CASDOOR_REDIRECT_PATH:-callback}
        VITE_CASDOOR_POST_LOGOUT_PATH: ${SHOWCASE_CASDOOR_POST_LOGOUT_PATH:-login}
        VITE_CASDOOR_SILENT_PATH: ${SHOWCASE_CASDOOR_SILENT_PATH:-oidc-silent}
    environment:
      # CSP 的 edge/Casdoor 源在容器启动时 envsubst 进 nginx 模板，取值与构建期 VITE_EDGE_BASE_URL /
      # VITE_CASDOOR_ISSUER 同源（同一 SHOWCASE_* 变量），端口不再漂移。FILTER 保证只替换 CSP_* 变量。
      CSP_EDGE_ORIGIN: ${SHOWCASE_EDGE_BASE_URL:-http://localhost:8080}
      CSP_CASDOOR_ORIGIN: ${SHOWCASE_CASDOOR_ISSUER:-http://localhost:8000}
      NGINX_ENVSUBST_FILTER: "^CSP_"
    ports:
      - "8093:80"

  # order-service：按订单号只读查订单，供深度 Agent 的 order_query 动作调用。
  # 共用 mysql 容器 + 独立 schema order_service（createDatabaseIfNotExist=true 自建）。
  # 宿主机 8093 已被 capability-showcase-frontend 占用，故容器内 8093 映射到宿主机 8094。
  order-service:
    build:
      context: ../order-service
    environment:
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      ORDER_DB_URL: jdbc:mysql://mysql:3306/order_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
      ORDER_DB_USER: root
      ORDER_DB_PASSWORD: root
      ORDER_SEED_DEMO: ${ORDER_SEED_DEMO:-true}
      # platform-security 的限流默认落 Redis（与其它服务一致）——指向栈内 redis，否则回退 localhost 连不上、
      # RedisReactiveHealthIndicator 拖挂 /actuator/health（liveness/readiness 仍 UP）。order 自身逻辑不用 Redis。
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - mysql
      - redis
    ports:
      - "8094:8093"

  edge-gateway:
    build:
      context: ../edge-gateway
    environment:
      CONVERSATION_URI: http://conversation-service:8081
      WORKFLOW_URI: http://workflow-service:8082
      ANALYTICS_URI: http://analytics-service:8083
      KNOWLEDGE_URI: http://knowledge-service:8084
      AGENT_URI: http://agent-service:8085
      ASYNC_TASK_URI: http://async-task-service:8086
      CHANNEL_URI: http://channel-service:8087
      INTEROP_URI: http://interop-service:8088
      EVAL_URI: http://eval-service:8089
      VISION_URI: http://vision-service:8090
      VOICE_URI: http://voice-service:8091
      AUTH_URI: http://auth-service:8092
      ORDER_URI: http://order-service:8093
      # 允许分离部署的展示前端跨域（含 compose 内 :8093 与本地 dev/preview 端口）。
      GATEWAY_CORS_ORIGINS: ${GATEWAY_CORS_ORIGINS:-http://localhost:8093,http://localhost:5173,http://localhost:5273,http://localhost:4173}
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET:-dev-only-internal-secret-change-me-please-32b}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:-dev-only-session-secret-change-me-please-32b}
      # ③ Casdoor SSO（阶段④联调）。默认关，引入即安全。开启后 edge 验 Casdoor access token → 换发内部 JWT。
      # 注：JWKS 拉取用 host.docker.internal（edge 与 casdoor 不同 docker 网络）；issuer 保持 localhost:8000
      # 以匹配 token 的 iss（issuer 校验是字符串比较，不发网络请求）。audiences=auth-console client_id。
      EDGE_CASDOOR_ENABLED: ${EDGE_CASDOOR_ENABLED:-true}
      # 认证模式：dual（灰度，验不过透传 legacy）| only（严格 Casdoor-only，非 open path 无有效 token → 401）。
      # 最终验收切 only；保留 dual 作应急回滚窗口。仅 EDGE_CASDOOR_ENABLED=true 时生效。
      EDGE_CASDOOR_MODE: ${EDGE_CASDOOR_MODE:-only}
      CASDOOR_ISSUER: ${CASDOOR_ISSUER:-http://localhost:8000}
      CASDOOR_JWKS: ${CASDOOR_JWKS:-http://host.docker.internal:8000/.well-known/jwks}
      # 多 audience（设计 §10.2）：前端 auth-console(PKCE) + 机器 service app(app-built-in, client_credentials/password)。
      CASDOOR_AUDIENCES: ${CASDOOR_AUDIENCES:-ragshared0client00000001,ea46d9a8033b0be2d8ed}
      # 注：入站最大请求头（Casdoor 大 token 防 431）已移入 edge application.yml（server.max-http-request-header-size，
      # 默认 32KB，仍可用 SERVER_MAX_HTTP_REQUEST_HEADER_SIZE 覆盖）。SPRING_AUTOCONFIGURE_EXCLUDE 已移除——
      # edge pom 改用 spring-security-oauth2-jose（无 spring-security-web/resource-server），不再触发那条 SecurityWebFilterChain。
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      - conversation-service
      - workflow-service
      - analytics-service
      - knowledge-service
      - agent-service
      - async-task-service
      - auth-service
      - channel-service
      - interop-service
      - vision-service
      - voice-service
      - order-service
    ports:
      - "${EDGE_HOST_PORT:-8080}:8080"

volumes:
  mysql-data:
  qdrant-data:
  redis-data:
  es-data:
  litellm-postgres-data:
